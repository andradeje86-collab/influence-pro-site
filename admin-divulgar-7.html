<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Admin — Divulgar | Influence PRO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07070F;color:#EAE8F5;min-height:100vh;max-width:480px;margin:0 auto}
    .hdr{background:#0F0F1C;border-bottom:1px solid #1A1A2E;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
    .back-btn{width:36px;height:36px;border-radius:10px;border:1px solid #1A1A2E;background:none;color:#EAE8F5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .page{padding:16px}
    .card{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:14px;padding:14px;margin-bottom:10px}
    .tabs{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
    .tab-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid #1A1A2E;background:#0F0F1C;color:#6B6880;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
    .tab-btn.active{background:#F8717118;border-color:#F8717144;color:#F87171}
    .field{margin-bottom:10px}
    .field label{font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:4px;letter-spacing:1px}
    .field input,.field textarea,.field select{width:100%;background:#07070F;border:1px solid #1A1A2E;border-radius:9px;padding:9px 11px;font-size:13px;color:#EAE8F5;outline:none;font-family:inherit}
    .field textarea{min-height:70px;resize:none}
    .btn-green{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#34D399,#059669);color:#FFF;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:7px}
    .btn-red{width:100%;padding:10px;border-radius:10px;border:1px solid #F8717130;background:#F8717108;color:#F87171;font-weight:700;font-size:13px;cursor:pointer}
    .btn-yellow{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#000;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:7px}
    .btn-outline{width:100%;padding:10px;border-radius:10px;border:1px solid #1A1A2E;background:transparent;color:#6B6880;font-weight:700;font-size:13px;cursor:pointer}
    .tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .stat-box{border-radius:12px;padding:10px 6px;text-align:center}
    .loading{text-align:center;padding:48px;color:#6B6880}
    .spin{display:inline-block;width:28px;height:28px;border:3px solid #1A1A2E;border-top-color:#F87171;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:32px;color:#6B6880;font-size:13px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:22px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
    .toast.show{opacity:1}
    .overlay{position:fixed;inset:0;background:#000000CC;z-index:100;display:flex;align-items:flex-end}
    .sheet{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88vh;overflow-y:auto}
    .handle{width:38px;height:4px;background:#1A1A2E;border-radius:2px;margin:0 auto 18px}
    .tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .tipo-btn{padding:9px 4px;border-radius:9px;border:2px solid #1A1A2E;background:#07070F;cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:#6B6880}
    .tipo-btn.sel{border-color:#FBBF24;background:#FBBF2418;color:#FBBF24}
  @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="hdr">
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <div style="font-size:16px;font-weight:800">📣 Admin — Divulgar</div>
    <div style="font-size:10px;color:#6B6880">Marketplace de marcas</div>
  </div>
</div>

<div class="page" id="main">
  <div class="loading"><div class="spin"></div><br/><br/>Verificando acesso...</div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="modal" style="display:none" onclick="closeOverlay(event)">
  <div class="sheet" id="modal-body"><div class="handle"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, addDoc, updateDoc, onSnapshot, query, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyD7rv-cygkLUyTZydUV3SLe2GH7DV30_Yc",
  authDomain:"influencer-pro-1b9b0.firebaseapp.com",
  projectId:"influencer-pro-1b9b0",
  storageBucket:"influencer-pro-1b9b0.firebasestorage.app",
  messagingSenderId:"234691340961",
  appId:"1:234691340961:web:0298046c2c50252a0b5ee0",
});
const db   = getFirestore(app);
const auth = getAuth(app);

let proposals  = [];
let cands      = [];
let activeTab  = "pendentes";
let newTipo    = "Reels";

// Try Firebase auth first, fallback to password
function tryAuth() {
  onAuthStateChanged(auth, async user => {
    if (user) {
      const snap = await getDoc(doc(db,"users",user.uid));
      if (snap.exists() && snap.data().isAdmin) {
        startListeners(); return;
      }
    }
    // Show login form
    showLoginForm();
  });
}

function showLoginForm() {
  document.getElementById("main").innerHTML = `
    <div style="max-width:340px;margin:60px auto;padding:0 16px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:40px;margin-bottom:10px">🔐</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:4px">Admin — Divulgar</div>
        <div style="font-size:13px;color:#6B6880">Entre com suas credenciais de administrador</div>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:5px;letter-spacing:1px">USUÁRIO</label>
        <input id="login-user" type="text" placeholder="admin" value="admin"
          style="width:100%;background:#0F0F1C;border:1px solid #1A1A2E;border-radius:10px;padding:12px 14px;font-size:14px;color:#EAE8F5;outline:none"/>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:5px;letter-spacing:1px">SENHA</label>
        <input id="login-pass" type="password" placeholder="••••••••"
          style="width:100%;background:#0F0F1C;border:1px solid #1A1A2E;border-radius:10px;padding:12px 14px;font-size:14px;color:#EAE8F5;outline:none"/>
      </div>
      <div id="login-err" style="background:#F8717114;border:1px solid #F8717130;border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:#F87171;display:none">
        ❌ Usuário ou senha incorretos
      </div>
      <button onclick="doLogin()" id="login-btn"
        style="width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#F87171,#EF4444);color:#FFF;font-weight:800;font-size:15px;cursor:pointer">
        Entrar no Admin
      </button>
    </div>`;

  document.getElementById("login-pass").addEventListener("keyup", e => {
    if(e.key==="Enter") doLogin();
  });
}

window.doLogin = async () => {
  const user2 = document.getElementById("login-user")?.value?.trim();
  const pass  = document.getElementById("login-pass")?.value?.trim();
  const btn   = document.getElementById("login-btn");
  const err   = document.getElementById("login-err");
  if (!user2 || !pass) return;
  err.style.display = "none";
  btn.textContent = "Entrando..."; btn.disabled = true;

  // Admin direto — sem Firebase
  if (user2.toLowerCase() === "admin" && pass === "admin123") {
    document.getElementById("main").innerHTML = '<div style="text-align:center;padding:40px"><div style="display:inline-block;width:28px;height:28px;border:3px solid #1A1A2E;border-top-color:#F87171;border-radius:50%;animation:spin .7s linear infinite"></div><div style="color:#6B6880;font-size:13px;margin-top:12px">Carregando painel...</div></div>';
    startListeners();
    return;
  }

  // Outro admin via Firebase
  try {
    const cred = await signInWithEmailAndPassword(auth, user2, pass);
    const snap = await getDoc(doc(db,"users",cred.user.uid));
    if (snap.exists() && snap.data().isAdmin) {
      document.getElementById("main").innerHTML = '<div style="text-align:center;padding:40px"><div style="display:inline-block;width:28px;height:28px;border:3px solid #1A1A2E;border-top-color:#F87171;border-radius:50%;animation:spin .7s linear infinite"></div></div>';
      startListeners();
      return;
    }
    err.textContent = "❌ Acesso restrito ao administrador";
  } catch(e) {
    err.textContent = "❌ Usuário ou senha incorretos";
  }
  err.style.display = "block";
  btn.textContent = "Entrar no Admin"; btn.disabled = false;
};

tryAuth();

function startListeners() {
  onSnapshot(collection(db,"marcasPropostas"), snap => {
    window._marcasPropostas = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    render();
  });
  onSnapshot(collection(db,"marketplace"), snap => {
    proposals = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    render();
  });
  onSnapshot(collection(db,"mktCandidaturas"), snap => {
    cands = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

function render() {
  const m = document.getElementById("main");
  const pend   = cands.filter(c=>c.status==="pendente").length;
  const aguard = cands.filter(c=>c.status==="aguardando_marca").length;
  const anal   = cands.filter(c=>c.status==="em_analise").length;
  const pagos  = cands.filter(c=>c.status==="pago").length;
  const totalGanho = cands.filter(c=>c.status==="pago").reduce((a,b)=>a+(b.valorBruto||0)*0.2,0);

  m.innerHTML = `
    <!-- Share link -->
    <div style="background:#FBBF2410;border:1px solid #FBBF2430;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center">
      <span style="font-size:18px">🔗</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:#FBBF24;margin-bottom:2px">Link para marcas cadastrarem propostas:</div>
        <div style="font-size:11px;color:#6B6880">www.influpro.com.br/marcas</div>
      </div>
      <button onclick="navigator.clipboard.writeText('https://www.influpro.com.br/marcas').then(()=>showToast('✅ Link copiado!','#34D399'))" style="padding:6px 12px;border-radius:8px;border:1px solid #FBBF2440;background:#FBBF2418;color:#FBBF24;font-weight:700;font-size:11px;cursor:pointer">Copiar</button>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      ${[
        {l:"Propostas ativas",v:proposals.filter(p=>p.status==="ativo").length,c:"#FBBF24"},
        {l:"Candidaturas",v:cands.length,c:"#7C6AF7"},
        {l:"Taxa arrecadada",v:`R$${totalGanho.toFixed(0)}`,c:"#34D399"},
      ].map(s=>`<div class="stat-box" style="background:${s.c}0C;border:1px solid ${s.c}28"><div style="font-size:18px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:9px;color:#6B6880;margin-top:2px">${s.l}</div></div>`).join("")}
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn ${activeTab==="marcas"?"active":""}" onclick="setTab('marcas')">🏷️ Marcas (${(window._marcasPropostas||[]).filter(m=>m.status==="pendente_admin").length})</button>
      <button class="tab-btn ${activeTab==="proposta"?"active":""}" onclick="setTab('proposta')">➕ Nova Proposta</button>
      <button class="tab-btn ${activeTab==="pendentes"?"active":""}" onclick="setTab('pendentes')">⏳ Pendentes (${pend})</button>
      <button class="tab-btn ${activeTab==="aguardando"?"active":""}" onclick="setTab('aguardando')">⏳ Ag. marca (${aguard})</button>
      <button class="tab-btn ${activeTab==="analise"?"active":""}" onclick="setTab('analise')">🔍 Em análise (${anal})</button>
      <button class="tab-btn ${activeTab==="aguardando"?"active":""}" onclick="setTab('aguardando')">⏳ Ag. marca (${aguard})</button>
      <button class="tab-btn ${activeTab==="pagos"?"active":""}" onclick="setTab('pagos')">💰 Pagos (${pagos})</button>
      <button class="tab-btn ${activeTab==="propostas"?"active":""}" onclick="setTab('propostas')">📋 Propostas</button>
    </div>

    <div id="tab-body"></div>
  `;
  renderTab();
}

function renderTab() {
  const b = document.getElementById("tab-body");
  if (!b) return;

  if (activeTab === "marcas") {
    const mp = window._marcasPropostas || [];
    if (!mp.length) { b.innerHTML = '<div class="empty">Nenhuma proposta de marca ainda.<br/>Compartilhe o link <strong style="color:#FBBF24">influpro.com.br/marcas</strong> com as marcas!</div>'; return; }
    b.innerHTML = mp.map(m => {
      const isPend = m.status === "pendente_admin";
      const isAprov= m.status === "ativo";
      const sc = isPend ? "#FBBF24" : isAprov ? "#34D399" : "#F87171";
      return `
      <div class="card" style="border-color:${sc}44">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-size:15px;font-weight:800">${m.marca}</div>
            <div style="font-size:11px;color:#6B6880">${m.nome} · ${m.email}</div>
            ${m.phone?`<div style="font-size:11px;color:#6B6880">📱 ${m.phone}</div>`:""}
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:800;color:#FBBF24">R$ ${m.valor}</div>
            <div style="font-size:10px;color:#6B6880">${m.tipo} · ${m.vagas} vagas</div>
          </div>
        </div>
        <div style="background:#07070F;border-radius:8px;padding:8px 11px;margin-bottom:8px;font-size:12px;color:#6B6880;line-height:1.5">${m.briefing}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">
          <span style="background:#FBBF2418;color:#FBBF24;border:1px solid #FBBF2430;border-radius:20px;padding:2px 9px">⏰ ${m.prazo||"7 dias"}</span>
          ${m.nicho?`<span style="background:#7C6AF718;color:#7C6AF7;border:1px solid #7C6AF730;border-radius:20px;padding:2px 9px">🎯 ${m.nicho}</span>`:""}
          ${m.minSeguidores?`<span style="background:#1A1A2E;color:#6B6880;border-radius:20px;padding:2px 9px">👥 ${Number(m.minSeguidores).toLocaleString("pt-BR")}+ seg.</span>`:""}
          <span style="background:${sc}18;color:${sc};border:1px solid ${sc}44;border-radius:20px;padding:2px 9px;font-weight:700">${isPend?"⏳ Aguardando":isAprov?"✅ Aprovada":"❌ Recusada"}</span>
        </div>
        ${isPend ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          <button class="btn-green" data-id="${m.id}" onclick="aprovarMarcaById(this.dataset.id)">✅ Aprovar e publicar</button>
          <button class="btn-red" data-id="${m.id}" onclick="recusarMarca(this.dataset.id)">❌ Recusar</button>
        </div>` : isAprov ? `<div style="text-align:center;font-size:12px;color:#34D399;font-weight:700;padding:4px">✅ Publicada — influenciadores podem ver</div>` : `<div style="text-align:center;font-size:12px;color:#F87171;font-weight:700;padding:4px">❌ Recusada</div>`}
      </div>`;
    }).join("");
    return;
  }

  if (activeTab === "proposta") {
    b.innerHTML = `
      <div class="card">
        <div style="font-size:15px;font-weight:800;color:#FBBF24;margin-bottom:14px">🏪 Nova Proposta de Marca</div>
        <div class="field"><label>NOME DA MARCA *</label><input id="p-marca" placeholder="Ex: Nike Brasil"/></div>
        <div class="field"><label>VALOR BRUTO R$ *</label><input id="p-valor" type="number" placeholder="Ex: 200" oninput="calcFee()"/></div>
        <div id="fee-preview" style="display:none;background:#FBBF2410;border:1px solid #FBBF2430;border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span style="color:#6B6880">Influenciador (80%):</span><strong style="color:#34D399" id="fee-i">—</strong></div>
          <div style="display:flex;justify-content:space-between;margin-top:3px"><span style="color:#6B6880">Plataforma (20%):</span><strong style="color:#FBBF24" id="fee-p">—</strong></div>
        </div>
        <div class="field"><label>TIPO DE POST</label>
          <div class="tipo-grid">
            ${["Reels","Feed","Story","Campanha"].map(tp=>`<button class="tipo-btn${newTipo===tp?" sel":""}" onclick="setTipo('${tp}',this)">${{Reels:"🎬",Feed:"📸",Story:"📱",Campanha:"📦"}[tp]} ${tp}</button>`).join("")}
          </div>
        </div>
        <div class="field"><label>VAGAS</label><input id="p-vagas" type="number" value="3" placeholder="3"/></div>
        <div class="field"><label>PRAZO</label><input id="p-prazo" value="7 dias" placeholder="Ex: 7 dias"/></div>
        <div class="field"><label>BRIEFING *</label><textarea id="p-brief" placeholder="Descreva o que o influenciador deve postar, hashtags, menções..."></textarea></div>
        <div style="background:#07070F;border:1px solid #1A1A2E;border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:12px;color:#6B6880;line-height:1.5">
          ⚠️ O pagamento da marca ficará <strong style="color:#FBBF24">bloqueado na plataforma</strong> até você confirmar a aprovação do conteúdo entregue pelo influenciador.
        </div>
        <button class="btn-yellow" onclick="criarProposta()">✅ Publicar Proposta</button>
      </div>`;
    return;
  }

  if (activeTab === "propostas") {
    const allProps = [...proposals, ...(window._marcasPropostas||[]).filter(m=>m.status==="ativo")];
    if (!allProps.length) { b.innerHTML = '<div class="empty">Nenhuma proposta ativa ainda.</div>'; return; }
    b.innerHTML = allProps.map(p => {
      const pCands = cands.filter(c=>c.proposalId===p.id || c.proposalId===p.id);
      const taxa   = pCands.filter(c=>c.status==="pago").reduce((a,c)=>a+(c.valorBruto||0)*0.2,0);
      return `
      <div class="card" style="border-color:${p.status==="ativo"?"#FBBF2444":"#F8717130"}">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div><div style="font-size:15px;font-weight:800">${p.marca}</div><div style="font-size:11px;color:#6B6880">${p.tipo} · ${p.prazo} · ${p.vagasRestantes??0}/${p.vagas} vagas</div></div>
          <div style="text-align:right"><div style="font-size:16px;font-weight:800;color:#FBBF24">R$ ${p.valor}</div><div style="font-size:10px;font-weight:700;color:${p.status==="ativo"?"#34D399":"#F87171"}">${p.status==="ativo"?"● Ativo":"● Encerrado"}</div></div>
        </div>
        <div style="font-size:12px;color:#6B6880;background:#07070F;border-radius:8px;padding:7px 10px;margin-bottom:8px">${p.briefing}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
          ${[{l:"Candidatos",v:pCands.length,c:"#7C6AF7"},{l:"Pagos",v:pCands.filter(c=>c.status==="pago").length,c:"#34D399"},{l:"Taxa",v:`R$${taxa.toFixed(0)}`,c:"#FBBF24"}].map(s=>`<div style="background:${s.c}0C;border-radius:8px;padding:6px;text-align:center"><div style="font-size:14px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:9px;color:#6B6880">${s.l}</div></div>`).join("")}
        </div>
        <button onclick="toggleProposta('${p.id}','${p.status}')" style="width:100%;padding:8px;border-radius:8px;border:1px solid ${p.status==="ativo"?"#F8717130":"#34D39930"};background:${p.status==="ativo"?"#F8717108":"#34D39908"};color:${p.status==="ativo"?"#F87171":"#34D399"};font-weight:700;font-size:12px;cursor:pointer">
          ${p.status==="ativo"?"⏹ Encerrar proposta":"▶ Reabrir proposta"}
        </button>
      </div>`;
    }).join("");
    return;
  }

  // Candidatures by status
  const statusMap = {
    pendentes:"pendente",
    aguardando:"aguardando_marca",
    analise:"em_analise",
    aguardando:"aguardando_marca",
    pagos:"pago"
  };
  const filtered = cands.filter(c=>c.status===statusMap[activeTab]);

  if (!filtered.length) {
    b.innerHTML = `<div class="empty">Nenhuma candidatura neste status.</div>`;
    return;
  }

  b.innerHTML = filtered.map(c => {
    const p = proposals.find(x=>x.id===c.proposalId);
    const tipoColor = {Reels:"#F87171",Feed:"#34D399",Story:"#FBBF24",Campanha:"#A78BFA"}[c.tipo]||"#7C6AF7";
    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,${tipoColor},${tipoColor}88);display:flex;align-items:center;justify-content:center;font-weight:800;color:#FFF;font-size:14px;flex-shrink:0">${c.userAvatar||"?"}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700">${c.userName}</div>
          <div style="font-size:11px;color:#6B6880">${c.userHandle} · ${(c.followers||0).toLocaleString("pt-BR")} seg.</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:800;color:#34D399">R$ ${(c.valorInflu||0).toFixed(2)}</div>
          <div style="font-size:10px;color:#6B6880">${c.marca} · ${c.tipo}</div>
        </div>
      </div>
      ${c.obs?`<div style="background:#07070F;border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:12px;color:#6B6880;font-style:italic">"${c.obs}"</div>`:""}
      ${c.linkPost?`
        <div style="background:#A78BFA10;border:1px solid #A78BFA30;border-radius:9px;padding:9px 12px;margin-bottom:10px">
          <div style="font-size:10px;font-weight:800;color:#A78BFA;margin-bottom:4px">LINK DO POST</div>
          <a href="${c.linkPost}" target="_blank" style="font-size:12px;color:#A78BFA;word-break:break-all">${c.linkPost}</a>
          <div style="font-size:10px;color:#6B6880;margin-top:3px">Entregue em: ${c.dataEntrega||"—"}</div>
        </div>`:""}
      <div style="display:grid;gap:7px">
        ${activeTab==="pendentes"?`
          <button class="btn-green" onclick="aprovarCand('${c.id}')">✅ Aprovar candidatura</button>
          <button class="btn-red" onclick="recusarCand('${c.id}')">❌ Recusar</button>
        `:""}
        ${activeTab==="aguardando"?`
          <div style="background:#FBBF2410;border:1px solid #FBBF2430;border-radius:9px;padding:9px 12px;margin-bottom:8px;font-size:12px;color:#FBBF24">⏳ Aguardando aprovação da marca para liberar o pagamento de R$ ${(c.valorInflu||0).toFixed(2)}</div>
          <button class="btn-green" onclick="marcarEmAnalise('${c.id}')">🔍 Mover para análise interna</button>
        `:""}
        ${activeTab==="analise"?`
          <button class="btn-green" onclick="confirmarPagamento('${c.id}','${c.proposalId}',${c.valorInflu||0},${c.valorBruto||0})">💰 Confirmar e pagar influenciador</button>
          <button class="btn-red" onclick="devolverCand('${c.id}')">🔄 Devolver (refazer post)</button>
        `:""}
        ${activeTab==="pagos"?`
          <div style="text-align:center;padding:6px;font-size:12px;color:#34D399;font-weight:700">✅ Pago em ${c.dataPagamento||"—"} · Taxa R$ ${((c.valorBruto||0)*0.2).toFixed(2)}</div>
        `:""}
      </div>
    </div>`;
  }).join("");
}

// ── ACTIONS
window.setTab = (tab) => { activeTab=tab; render(); };
window.setTipo = (t,btn) => {
  newTipo=t;
  document.querySelectorAll(".tipo-btn").forEach(b=>b.className="tipo-btn");
  btn.className="tipo-btn sel";
};
window.calcFee = () => {
  const v=Number(document.getElementById("p-valor")?.value||0);
  if(v>0){
    document.getElementById("fee-preview").style.display="block";
    document.getElementById("fee-i").textContent=`R$ ${(v*0.8).toFixed(2)}`;
    document.getElementById("fee-p").textContent=`R$ ${(v*0.2).toFixed(2)}`;
  } else {
    document.getElementById("fee-preview").style.display="none";
  }
};

window.criarProposta = async () => {
  const marca=document.getElementById("p-marca")?.value?.trim();
  const valor=Number(document.getElementById("p-valor")?.value||0);
  const brief=document.getElementById("p-brief")?.value?.trim();
  const vagas=Number(document.getElementById("p-vagas")?.value||3);
  const prazo=document.getElementById("p-prazo")?.value||"7 dias";
  if(!marca||!valor||!brief){showToast("⚠️ Preencha marca, valor e briefing","#F87171");return;}
  try {
    // Save directly to marcasPropostas with status=ativo
    // so divulgar.html picks it up automatically
    await addDoc(collection(db,"marcasPropostas"),{
      marca, nome:"Admin Influence PRO", email:"admin@influpro.com.br",
      tipo:newTipo, valor, vagas, vagasRestantes:vagas,
      prazo, briefing:brief, status:"ativo",
      origem:"admin_direto",
      createdAt:serverTimestamp()
    });
    showToast("✅ Proposta publicada para influenciadores!","#34D399");
    document.getElementById("p-marca").value="";
    document.getElementById("p-valor").value="";
    document.getElementById("p-brief").value="";
    activeTab="propostas"; render();
  } catch(e){ showToast("❌ Erro ao criar","#F87171"); }
};

window.aprovarCand = async (id) => {
  await updateDoc(doc(db,"mktCandidaturas",id),{status:"aprovado",dataAprovacao:new Date().toISOString().substr(0,10)});
  showToast("✅ Candidatura aprovada!","#34D399");
};
window.recusarCand = async (id) => {
  if(!confirm("Recusar esta candidatura?")) return;
  await updateDoc(doc(db,"mktCandidaturas",id),{status:"recusado"});
  showToast("Candidatura recusada","#F87171");
};
window.marcarEmAnalise = async (id) => {
  await updateDoc(doc(db,"mktCandidaturas",id),{status:"em_analise"});
  showToast("🔍 Movido para análise","#A78BFA");
};

window.enviarLinkMarca = async (candId, proposalId) => {
  try {
    // Get proposal email
    let email = "";
    const snapP = await getDoc(doc(db,"marcasPropostas",proposalId));
    if (snapP.exists()) email = snapP.data().email||"";
    if (!email) {
      const snapM = await getDoc(doc(db,"marketplace",proposalId));
      if (snapM.exists()) email = snapM.data().email||"";
    }

    const reviewLink = `https://www.influpro.com.br/marca-revisar?pid=${proposalId}&email=${encodeURIComponent(email)}`;

    if (email) {
      // Copy link to clipboard and show it
      navigator.clipboard?.writeText(reviewLink).catch(()=>{});
      showToast("✅ Link copiado! Envie para: "+email,"#34D399");
      alert(`Envie este link para a marca (${email}):

${reviewLink}

O link foi copiado para a área de transferência.`);
    } else {
      navigator.clipboard?.writeText(reviewLink).catch(()=>{});
      showToast("✅ Link copiado!","#34D399");
      alert(`Envie este link para a marca revisar o post:

${reviewLink}`);
    }
  } catch(e) { showToast("❌ Erro ao gerar link","#F87171"); }
};
window.devolverCand = async (id) => {
  if(!confirm("Devolver para o influenciador refazer?")) return;
  await updateDoc(doc(db,"mktCandidaturas",id),{status:"aprovado",linkPost:null});
  showToast("🔄 Devolvido","#FBBF24");
};
window.confirmarPagamento = async (id, proposalId, valorInflu, valorBruto) => {
  if(!confirm(`Confirmar pagamento de R$ ${valorInflu.toFixed(2)} ao influenciador?\nTaxa da plataforma: R$ ${(valorBruto*0.2).toFixed(2)}`)) return;
  await updateDoc(doc(db,"mktCandidaturas",id),{status:"pago",dataPagamento:new Date().toISOString().substr(0,10)});
  showToast(`💰 Pago! Taxa R$ ${(valorBruto*0.2).toFixed(2)} retida.`,"#34D399");
};
window.toggleProposta = async (id, status) => {
  await updateDoc(doc(db,"marketplace",id),{status:status==="ativo"?"encerrado":"ativo"});
  showToast(status==="ativo"?"Proposta encerrada":"Proposta reaberta","#FBBF24");
};

window.aprovarMarca = async (id) => { aprovarMarcaById(id); };

window.aprovarMarcaById = async (id) => {
  try {
    const snap = await getDoc(doc(db,"marcasPropostas",id));
    if (!snap.exists()) { showToast("❌ Proposta não encontrada","#F87171"); return; }
    const m2 = snap.data();
    await updateDoc(doc(db,"marcasPropostas",id),{
      status: "ativo",
      vagasRestantes: Number(m2.vagas||3),
      dataAprovacao: new Date().toISOString().substr(0,10),
    });
    showToast("✅ Aprovada! Já aparece para influenciadores Premium.","#34D399");
    activeTab = "propostas";
  } catch(e) {
    console.error(e);
    showToast("❌ Erro ao aprovar: "+e.message,"#F87171");
  }
};

window.recusarMarca = async (id) => {
  if (!confirm("Recusar esta proposta de marca?")) return;
  await updateDoc(doc(db,"marcasPropostas",id),{status:"recusado"});
  showToast("Proposta recusada","#F87171");
};

function showError(msg) {
  document.getElementById("main").innerHTML=`<div style="text-align:center;padding:48px 24px;color:#6B6880"><div style="font-size:40px;margin-bottom:14px">🔒</div><p>${msg}</p><button onclick="window.location.href='https://app.influpro.com.br'" style="margin-top:20px;padding:11px 24px;border-radius:20px;background:#7C6AF7;border:none;color:#FFF;font-weight:700;cursor:pointer">← Voltar ao app</button></div>`;
}

window.closeOverlay = (e) => { if(e.target.id==="modal") closeModal(); };
window.closeModal   = () => { document.getElementById("modal").style.display="none"; };

function showToast(msg,bg="#34D399") {
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=bg;
  t.style.color=bg==="#34D399"||bg==="#059669"?"#000":"#FFF";
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);
}
</script>
</body>
