<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Divulgar — Influence PRO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07070F;color:#EAE8F5;min-height:100vh;max-width:480px;margin:0 auto}

    /* HEADER */
    .hdr{background:#0F0F1C;border-bottom:1px solid #1A1A2E;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
    .back-btn{width:36px;height:36px;border-radius:10px;border:1px solid #1A1A2E;background:none;color:#EAE8F5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .hdr-title{font-size:16px;font-weight:800}
    .hdr-badge{margin-left:auto;background:linear-gradient(135deg,#7C6AF7,#EC4899);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;color:#FFF}

    /* PAGE */
    .page{padding:16px}

    /* LOCK SCREEN */
    .lock{text-align:center;padding:48px 24px}
    .lock-icon{font-size:56px;margin-bottom:16px}
    .lock h2{font-size:22px;font-weight:800;margin-bottom:10px}
    .lock p{font-size:14px;color:#6B6880;line-height:1.7;margin-bottom:24px}
    .lock-btn{display:inline-block;padding:14px 32px;border-radius:25px;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:15px;border:none;cursor:pointer}

    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:18px}
    .tab-btn{flex:1;padding:10px 8px;border-radius:12px;border:2px solid #1A1A2E;background:#0F0F1C;color:#6B6880;font-weight:800;font-size:13px;cursor:pointer;transition:.2s}
    .tab-btn.active{border-color:#7C6AF788;background:#7C6AF718;color:#7C6AF7}

    /* CARDS */
    .card{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:16px;padding:16px;margin-bottom:12px}
    .card-hot{border-color:#F8717144;background:#F8717106}
    .card-new{border-color:#34D39944;background:#34D39906}

    /* BRAND HEADER */
    .brand-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .brand-logo{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#FFF;flex-shrink:0}
    .brand-name{font-size:15px;font-weight:800}
    .brand-meta{font-size:11px;color:#6B6880;margin-top:2px}
    .valor-badge{margin-left:auto;text-align:right}
    .valor-num{font-size:20px;font-weight:800;color:#34D399}
    .valor-lbl{font-size:10px;color:#6B6880}

    /* TAGS */
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .tag-reels{background:#F8717118;color:#F87171;border:1px solid #F8717130}
    .tag-feed{background:#34D39918;color:#34D399;border:1px solid #34D39930}
    .tag-story{background:#FBBF2418;color:#FBBF24;border:1px solid #FBBF2430}
    .tag-campanha{background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA30}
    .tag-prazo{background:#6B688018;color:#9CA3AF;border:1px solid #6B688030}
    .tag-vagas{background:#34D39918;color:#34D399;border:1px solid #34D39930}
    .tag-hot{background:#F8717118;color:#F87171;border:1px solid #F8717130}
    .tag-new{background:#34D39918;color:#34D399;border:1px solid #34D39930}

    /* BRIEFING */
    .briefing{background:#07070F;border-radius:10px;padding:10px 13px;font-size:13px;color:#9CA3AF;line-height:1.6;margin-bottom:12px}
    .briefing-label{font-size:10px;font-weight:800;color:#6B6880;letter-spacing:1px;margin-bottom:5px}

    /* PROGRESS */
    .progress-row{display:flex;justify-content:space-between;font-size:11px;color:#6B6880;margin-bottom:4px}
    .progress-bar{height:6px;background:#1A1A2E;border-radius:3px;overflow:hidden;margin-bottom:12px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7C6AF7,#6366F1)}

    /* TAXA INFO */
    .taxa-box{background:#FBBF2410;border:1px solid #FBBF2430;border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:12px}
    .taxa-row{display:flex;justify-content:space-between;margin-bottom:3px}

    /* BUTTONS */
    .btn-cand{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:14px;cursor:pointer;transition:.2s}
    .btn-cand:hover{opacity:.9}
    .btn-cand:disabled{opacity:.4;cursor:not-allowed}
    .btn-outline{width:100%;padding:10px;border-radius:10px;border:1px solid #1A1A2E;background:transparent;color:#6B6880;font-weight:700;font-size:13px;cursor:pointer}

    /* STATUS CARDS */
    .status-pendente{background:#FBBF2410;border:1px solid #FBBF2430}
    .status-aprovado{background:#7C6AF710;border:1px solid #7C6AF730}
    .status-entregue{background:#A78BFA10;border:1px solid #A78BFA30}
    .status-pago{background:#34D39910;border:1px solid #34D39930}
    .status-recusado{background:#F8717110;border:1px solid #F8717130}

    /* SUBMIT LINK */
    .link-input{width:100%;background:#07070F;border:1px solid #1A1A2E;border-radius:9px;padding:10px 12px;font-size:13px;color:#EAE8F5;outline:none;margin-bottom:8px;font-family:inherit}
    .link-input:focus{border-color:#7C6AF744}
    .btn-submit-link{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#34D399,#059669);color:#FFF;font-weight:700;font-size:13px;cursor:pointer}
    .btn-submit-link:disabled{opacity:.4;cursor:not-allowed}

    /* EMPTY */
    .empty{text-align:center;padding:40px 20px;color:#6B6880}
    .empty-icon{font-size:40px;margin-bottom:12px}

    /* LOADING */
    .loading{text-align:center;padding:48px;color:#6B6880}
    .spin{display:inline-block;width:30px;height:30px;border:3px solid #1A1A2E;border-top-color:#7C6AF7;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:22px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:#000000CC;z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
    .modal-sheet{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88vh;overflow-y:auto}
    .modal-handle{width:40px;height:4px;background:#1A1A2E;border-radius:2px;margin:0 auto 20px}

    /* SECTION LABEL */
    .sec-label{font-size:10px;font-weight:800;color:#6B6880;letter-spacing:2px;margin-bottom:10px}

    /* HIGHLIGHT BOX */
    .info-box{background:#7C6AF710;border:1px solid #7C6AF730;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;font-size:12px;color:#9CA3AF;line-height:1.6}

    /* BRAND FORM */
    .field{margin-bottom:12px}
    .field label{font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:4px;letter-spacing:1px}
    .field input,.field textarea,.field select{width:100%;background:#07070F;border:1px solid #1A1A2E;border-radius:9px;padding:10px 12px;font-size:13px;color:#EAE8F5;outline:none;font-family:inherit}
    .field input:focus,.field textarea:focus{border-color:#7C6AF744}
    .field textarea{min-height:75px;resize:none}
    .tipo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
    .tipo-btn{padding:10px;border-radius:10px;border:2px solid #1A1A2E;background:#07070F;cursor:pointer;text-align:center;font-size:13px;font-weight:700;color:#6B6880;transition:.2s}
    .tipo-btn.sel{border-color:#7C6AF7;background:#7C6AF718;color:#7C6AF7}

    /* HISTORY ITEM */
    .hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1A1A2E}
    .hist-item:last-child{border-bottom:none}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <div class="hdr-title">📣 Divulgar</div>
    <div style="font-size:10px;color:#6B6880">Marketplace de marcas</div>
  </div>
  <div class="hdr-badge" id="plan-badge" style="display:none">✦ PRO</div>
</div>

<!-- MAIN -->
<div class="page" id="main-content">
  <div class="loading"><div class="spin"></div><br/><br/>Carregando...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="closeOverlay(event)">
  <div class="modal-sheet" id="modal-body">
    <div class="modal-handle"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc, query, where, onSnapshot, serverTimestamp, orderBy }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app  = initializeApp({
  apiKey:"AIzaSyD7rv-cygkLUyTZydUV3SLe2GH7DV30_Yc",
  authDomain:"influencer-pro-1b9b0.firebaseapp.com",
  projectId:"influencer-pro-1b9b0",
  storageBucket:"influencer-pro-1b9b0.firebasestorage.app",
  messagingSenderId:"234691340961",
  appId:"1:234691340961:web:0298046c2c50252a0b5ee0",
});
const db   = getFirestore(app);
const auth = getAuth(app);

// ── State
let currentUser   = null;
let userDoc       = null;
let isPrem        = false;
let activeTab     = "oportunidades";
let proposals     = [];
let myCands       = [];
let unsubs        = [];

// ── Init
// Wait up to 4s for Firebase to restore session, then show login
let authResolved = false;
const authTimeout = setTimeout(() => {
  if (!authResolved) showLoginScreen();
}, 4000);

onAuthStateChanged(auth, async fireUser => {
  clearTimeout(authTimeout);
  authResolved = true;

  if (!fireUser) {
    showLoginScreen(); return;
  }
  const snap = await getDoc(doc(db,"users",fireUser.uid));
  if (!snap.exists()) { showLoginScreen(); return; }
  userDoc     = {id:snap.id,...snap.data()};
  currentUser = fireUser;
  const today = new Date().toISOString().substr(0,10);
  isPrem      = userDoc.plan==="premium" && (!userDoc.planExpiry || userDoc.planExpiry >= today);

  if (userDoc.isAdmin) { isPrem = true; } // admin always has access

  document.getElementById("plan-badge").style.display = isPrem ? "flex" : "none";

  if (!isPrem) { showLock(); return; }

  startListeners();
  renderPage();
});

function startListeners() {
  // Active proposals from marketplace (admin created)
  unsubs.push(onSnapshot(
    query(collection(db,"marketplace"), where("status","==","ativo")),
    snap => {
      const mkt = snap.docs.map(d=>({id:d.id,origem:"marketplace",...d.data()}));
      const direct = (window._directProposals||[]);
      proposals = [...mkt, ...direct]
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderPage();
    }
  ));
  // Active proposals from brand submissions (approved by admin)
  unsubs.push(onSnapshot(
    query(collection(db,"marcasPropostas"), where("status","==","ativo")),
    snap => {
      window._directProposals = snap.docs.map(d=>({id:d.id,origem:"marcasPropostas",...d.data()}));
      const mkt = proposals.filter(p=>p.origem==="marketplace");
      proposals = [...mkt, ...window._directProposals]
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderPage();
    }
  ));
  // My candidatures
  unsubs.push(onSnapshot(
    query(collection(db,"mktCandidaturas"), where("userId","==",currentUser.uid)),
    snap => {
      myCands = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPage();
    }
  ));
  window._directProposals = [];
}

// ── LOCK SCREEN
function showLock() {
  document.getElementById("main-content").innerHTML = `
    <div class="lock">
      <div class="lock-icon">🔒</div>
      <h2>Exclusivo Premium</h2>
      <p>O Marketplace de Divulgação é exclusivo para assinantes <strong style="color:#7C6AF7">Premium</strong>.<br/><br/>
      Assine por apenas <strong style="color:#34D399">R$ 10/mês</strong> e tenha acesso a propostas reais de marcas, pagamento via PIX e muito mais.</p>
      <div style="background:#7C6AF710;border:1px solid #7C6AF730;border-radius:12px;padding:14px;margin-bottom:24px;text-align:left">
        ${["✓ Acesso ao Marketplace de marcas","✓ Propostas com pagamento real","✓ Receba via PIX diretamente","✓ Publis ilimitadas no app","✓ Metas e relatórios avançados"].map(f=>`<div style="font-size:13px;color:#9CA3AF;padding:4px 0">${f}</div>`).join("")}
      </div>
      <button class="lock-btn" onclick="history.back()">← Voltar ao app</button>
    </div>`;
}

function showNotLogged() { showLoginScreen(); }

function showLoginScreen() {
  document.getElementById("main-content").innerHTML = `
    <div style="max-width:360px;margin:40px auto;padding:0 20px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:40px;margin-bottom:10px">📣</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:4px">Marketplace de Divulgação</div>
        <div style="font-size:13px;color:#6B6880">Entre com sua conta do Influence PRO</div>
      </div>
      <div style="margin-bottom:11px">
        <label style="font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:4px;letter-spacing:1px">E-MAIL / USUÁRIO</label>
        <input id="d-user" type="email" placeholder="seu@email.com"
          style="width:100%;background:#0F0F1C;border:1px solid #1A1A2E;border-radius:10px;padding:12px 14px;font-size:14px;color:#EAE8F5;outline:none;font-family:inherit"/>
      </div>
      <div style="margin-bottom:18px">
        <label style="font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:4px;letter-spacing:1px">SENHA</label>
        <input id="d-pass" type="password" placeholder="••••••••"
          style="width:100%;background:#0F0F1C;border:1px solid #1A1A2E;border-radius:10px;padding:12px 14px;font-size:14px;color:#EAE8F5;outline:none;font-family:inherit"/>
      </div>
      <div id="d-err" style="background:#F8717114;border:1px solid #F8717130;border-radius:8px;padding:9px;margin-bottom:11px;font-size:12px;color:#F87171;display:none">
        ❌ E-mail ou senha incorretos
      </div>
      <button onclick="doUserLogin()" id="d-btn"
        style="width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:12px">
        Entrar
      </button>
      <div style="text-align:center">
        <a href="https://app.influpro.com.br" style="font-size:13px;color:#6B6880">← Voltar ao app</a>
      </div>
    </div>`;

  document.getElementById("d-pass")?.addEventListener("keyup", e => {
    if(e.key==="Enter") doUserLogin();
  });
}

window.doUserLogin = async () => {
  const email = document.getElementById("d-user")?.value?.trim();
  const pass  = document.getElementById("d-pass")?.value?.trim();
  const btn   = document.getElementById("d-btn");
  const err   = document.getElementById("d-err");
  if(!email||!pass) return;
  err.style.display="none";
  btn.textContent="Entrando..."; btn.disabled=true;
  try {
    const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js");
    const { getDoc: gd, doc: dc } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js");
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const snap = await gd(dc(db,"users",cred.user.uid));
    if (!snap.exists()) { throw new Error("not found"); }
    userDoc     = {id:snap.id,...snap.data()};
    currentUser = cred.user;
    const today = new Date().toISOString().substr(0,10);
    isPrem      = userDoc.plan==="premium" && (!userDoc.planExpiry || userDoc.planExpiry >= today);
    if(userDoc.isAdmin) isPrem=true;
    document.getElementById("plan-badge").style.display = isPrem?"flex":"none";
    if(!isPrem){ showLock(); return; }
    startListeners();
    renderPage();
  } catch(e) {
    err.style.display="block";
    btn.textContent="Entrar"; btn.disabled=false;
  }
};

// ── MAIN RENDER
function renderPage() {
  const c = document.getElementById("main-content");

  // Stats row
  const totalOps    = proposals.length;
  const minhas      = myCands.length;
  const pagas       = myCands.filter(x=>x.status==="pago").length;
  const ganhos      = myCands.filter(x=>x.status==="pago").reduce((a,b)=>a+(b.valorInflu||0),0);

  c.innerHTML = `
    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      ${[
        {l:"Oportunidades",v:totalOps,c:"#7C6AF7"},
        {l:"Candidaturas",v:minhas,c:"#FBBF24"},
        {l:"Pagos",v:pagas,c:"#34D399"},
        {l:"Ganhos",v:`R$${ganhos.toFixed(0)}`,c:"#34D399"},
      ].map(s=>`
        <div style="background:${s.c}0C;border:1px solid ${s.c}28;border-radius:12px;padding:10px 4px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:${s.c}">${s.v}</div>
          <div style="font-size:9px;color:#6B6880;margin-top:2px">${s.l}</div>
        </div>`).join("")}
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn ${activeTab==="oportunidades"?"active":""}" onclick="switchTab('oportunidades')">🏪 Oportunidades</button>
      <button class="tab-btn ${activeTab==="minhas"?"active":""}" onclick="switchTab('minhas')">📋 Minhas (${minhas})</button>
    </div>

    <!-- Tab content -->
    <div id="tab-content"></div>
  `;

  renderTab();
}

function renderTab() {
  const c = document.getElementById("tab-content");
  if (!c) return;

  if (activeTab === "oportunidades") {
    if (proposals.length === 0) {
      c.innerHTML = `<div class="empty">
        <div class="empty-icon">🏪</div>
        <p style="margin-bottom:16px">Nenhuma oportunidade disponível no momento.<br/>Novas propostas de marcas aparecem aqui!</p>
        <div style="background:#7C6AF718;border:1px solid #7C6AF730;border-radius:12px;padding:12px 14px;font-size:12px;color:#9CA3AF;text-align:left;line-height:1.6">
          💡 Você também pode divulgar o próprio app e ganhar comissões indicando amigos pelo link da aba <strong style="color:#EAE8F5">Rede</strong> no app.
        </div>
      </div>`;
      return;
    }
    c.innerHTML = proposals.map(p => proposalCard(p)).join("");
  } else {
    if (myCands.length === 0) {
      c.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Você ainda não se candidatou a nenhuma proposta.<br/>Veja as oportunidades disponíveis!</p></div>`;
      return;
    }
    c.innerHTML = myCands.map(c2 => myCandCard(c2)).join("");
  }
}

// ── PROPOSAL CARD
function proposalCard(p) {
  const cand      = myCands.find(c=>c.proposalId===p.id);
  const vInflu    = (p.valor*0.8).toFixed(2);
  const vPlat     = (p.valor*0.2).toFixed(2);
  const vagas     = p.vagasRestantes ?? p.vagas ?? 0;
  const pct       = Math.round(((p.vagas||1)-(vagas))/(p.vagas||1)*100);
  const tipoColor = {Reels:"#F87171",Feed:"#34D399",Story:"#FBBF24",Campanha:"#A78BFA"}[p.tipo]||"#7C6AF7";
  const tipoClass = {Reels:"tag-reels",Feed:"tag-feed",Story:"tag-story",Campanha:"tag-campanha"}[p.tipo]||"";
  const isHot     = vagas <= 1;
  const isNew     = ((Date.now()/1000)-(p.createdAt?.seconds||0)) < 86400*2;

  return `
  <div class="card ${isHot?"card-hot":isNew?"card-new":""}">
    <!-- Brand header -->
    <div class="brand-row">
      <div class="brand-logo" style="background:linear-gradient(135deg,${tipoColor},${tipoColor}99)">
        ${(p.marca||"?").substr(0,2).toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div class="brand-name">${p.marca||"Marca"}</div>
        <div class="brand-meta">Publicado via Influence PRO</div>
      </div>
      <div class="valor-badge">
        <div class="valor-num">R$ ${vInflu}</div>
        <div class="valor-lbl">você recebe</div>
      </div>
    </div>

    <!-- Tags -->
    <div class="tags">
      <span class="tag ${tipoClass}">${{Reels:"🎬",Feed:"📸",Story:"📱",Campanha:"📦"}[p.tipo]||"📌"} ${p.tipo}</span>
      <span class="tag tag-prazo">⏰ ${p.prazo||"7 dias"}</span>
      <span class="tag tag-vagas">👥 ${vagas} vaga${vagas!==1?"s":""}</span>
      ${isHot?'<span class="tag tag-hot">🔥 Última vaga</span>':""}
      ${isNew?'<span class="tag tag-new">🆕 Novo</span>':""}
    </div>

    <!-- Briefing -->
    <div>
      <div class="briefing-label">BRIEFING</div>
      <div class="briefing">${p.briefing||"—"}</div>
    </div>

    <!-- Taxa info -->
    <div class="taxa-box">
      <div class="taxa-row"><span>💰 Valor bruto da marca:</span><span style="font-weight:700">R$ ${p.valor}</span></div>
      <div class="taxa-row"><span>✦ Sua parte (80%):</span><span style="color:#34D399;font-weight:700">R$ ${vInflu}</span></div>
      <div class="taxa-row"><span>🏦 Taxa da plataforma (20%):</span><span style="color:#FBBF24;font-weight:700">R$ ${vPlat}</span></div>
      <div style="font-size:10px;color:#6B6880;margin-top:4px">⚠️ O pagamento fica bloqueado na plataforma até a marca aprovar o post entregue.</div>
    </div>

    <!-- Vagas progress -->
    <div class="progress-row">
      <span>${p.vagas - vagas} de ${p.vagas} vagas preenchidas</span>
      <span style="color:#7C6AF7;font-weight:700">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <!-- Action -->
    ${!cand ? `
      <button class="btn-cand" onclick="candidatar('${p.id}')">🙋 Candidatar-se</button>
    ` : `
      <div style="background:#7C6AF718;border:1px solid #7C6AF730;border-radius:10px;padding:10px 13px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:#7C6AF7">
          ${statusLabel(cand.status)}
        </div>
        ${cand.status==="aprovado"?`<div style="font-size:11px;color:#6B6880;margin-top:4px">Vá em <strong>Minhas candidaturas</strong> para enviar o link do post</div>`:""}
      </div>
    `}
  </div>`;
}

// ── MY CAND CARD
function myCandCard(cand) {
  const p         = proposals.find(x=>x.id===cand.proposalId);
  const marca     = cand.marca || p?.marca || "Marca";
  const tipo      = cand.tipo  || p?.tipo  || "—";
  const tipoColor = {Reels:"#F87171",Feed:"#34D399",Story:"#FBBF24",Campanha:"#A78BFA"}[tipo]||"#7C6AF7";
  const statusColors = {pendente:"#FBBF24",aprovado:"#7C6AF7",em_analise:"#A78BFA",aguardando_marca:"#FBBF24",pago:"#34D399",recusado:"#F87171"};
  const sc = statusColors[cand.status]||"#6B6880";

  return `
  <div class="card status-${cand.status}" style="margin-bottom:12px">
    <div class="brand-row" style="margin-bottom:10px">
      <div class="brand-logo" style="background:linear-gradient(135deg,${tipoColor},${tipoColor}88)">${marca.substr(0,2).toUpperCase()}</div>
      <div style="flex:1">
        <div class="brand-name">${marca}</div>
        <div class="brand-meta">${tipo} · Enviado em ${cand.dataCandidatura||"—"}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:16px;font-weight:800;color:#34D399">R$ ${(cand.valorInflu||0).toFixed(2)}</div>
        <div style="font-size:10px;color:#6B6880">para você</div>
      </div>
    </div>

    <!-- Status pill -->
    <div style="background:${sc}18;border:1px solid ${sc}44;border-radius:10px;padding:9px 13px;margin-bottom:${cand.status==="aprovado"||cand.status==="em_analise"?"10px":"0"}">
      <div style="font-size:13px;font-weight:700;color:${sc}">${statusLabel(cand.status)}</div>
      ${cand.status==="pendente"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">O admin irá analisar e aprovar sua candidatura.</div>':""}
      ${cand.status==="aguardando_marca"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">Post enviado. Aguardando aprovação da marca. Pagamento bloqueado até lá.</div>':""}
      ${cand.status==="em_analise"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">O admin está verificando seu post.</div>':""}
      ${cand.status==="pago"?`<div style="font-size:11px;color:#34D399;margin-top:2px">Pago em ${cand.dataPagamento||"—"}. Parabéns! 🎉</div>`:""}
      ${cand.status==="recusado"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">Candidatura não aprovada desta vez.</div>':""}
    </div>

    <!-- Send link if approved -->
    ${cand.status==="aprovado"?`
      <div>
        <div class="briefing-label" style="margin-bottom:8px">📋 BRIEFING DA MARCA</div>
        <div class="briefing" style="margin-bottom:10px">${p?.briefing||"—"}</div>
        <div class="briefing-label" style="margin-bottom:6px">📤 ENVIAR LINK DO POST PUBLICADO</div>
        <input class="link-input" id="link-${cand.id}" placeholder="https://instagram.com/p/..."/>
        <button class="btn-submit-link" onclick="enviarLink('${cand.id}')">✅ Enviar post para aprovação da marca</button>
        <div style="font-size:11px;color:#6B6880;margin-top:6px;text-align:center">⚠️ O pagamento de R$ ${(cand.valorInflu||0).toFixed(2)} fica bloqueado até a marca aprovar.</div>
      </div>
    `:""}

    <!-- Show link if sent -->
    ${cand.status==="em_analise"||cand.status==="aguardando_marca"?`
      <div style="background:#A78BFA10;border-radius:8px;padding:8px 11px;display:flex;gap:8px;align-items:center">
        <span style="font-size:14px">🔗</span>
        <a href="${cand.linkPost}" target="_blank" style="font-size:12px;color:#A78BFA;word-break:break-all">${cand.linkPost||"—"}</a>
      </div>
    `:""}
  </div>`;
}

// ── CANDIDATAR
window.candidatar = async (proposalId) => {
  const p = proposals.find(x=>x.id===proposalId);
  if (!p) return;

  // Check if already applied
  if (myCands.find(c=>c.proposalId===proposalId)) {
    showToast("Você já se candidatou!","#FBBF24"); return;
  }

  // Check vagas
  const vagas = p.vagasRestantes ?? p.vagas ?? 0;
  if (vagas <= 0) { showToast("Sem vagas disponíveis","#F87171"); return; }

  showModal(`
    <div class="modal-handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">🙋 Candidatar-se</div>
    <div style="font-size:12px;color:#6B6880;margin-bottom:18px">${p.marca} · ${p.tipo}</div>

    <div class="info-box">
      <span style="font-size:18px">💡</span>
      <div>Ao se candidatar, o admin irá analisar seu perfil. Se aprovado, você receberá o briefing e deverá publicar o post. O pagamento de <strong style="color:#34D399">R$ ${(p.valor*0.8).toFixed(2)}</strong> fica bloqueado até a marca aprovar o conteúdo entregue.</div>
    </div>

    <div style="background:#0F0F1C;border:1px solid #1A1A2E;border-radius:12px;padding:12px;margin-bottom:16px">
      <div class="taxa-row" style="font-size:13px"><span style="color:#6B6880">Valor bruto:</span><span style="font-weight:700">R$ ${p.valor}</span></div>
      <div class="taxa-row" style="font-size:13px;margin-top:5px"><span style="color:#6B6880">Você recebe (80%):</span><span style="color:#34D399;font-weight:700">R$ ${(p.valor*0.8).toFixed(2)}</span></div>
      <div class="taxa-row" style="font-size:13px;margin-top:5px"><span style="color:#6B6880">Taxa plataforma (20%):</span><span style="color:#FBBF24;font-weight:700">R$ ${(p.valor*0.2).toFixed(2)}</span></div>
    </div>

    <div class="field">
      <label>OBSERVAÇÃO (opcional)</label>
      <textarea id="cand-obs" placeholder="Ex: Tenho 12k seguidores, nicho fitness, engajamento 5%..." style="min-height:60px"></textarea>
    </div>

    <button class="btn-cand" id="btn-confirmar-cand" onclick="confirmarCandidatura('${proposalId}','${p.marca}','${p.tipo}',${p.valor})">
      ✅ Confirmar candidatura
    </button>
    <button class="btn-outline" style="margin-top:8px" onclick="closeModal()">Cancelar</button>
  `);
};

window.confirmarCandidatura = async (proposalId, marca, tipo, valor) => {
  const btn = document.getElementById("btn-confirmar-cand");
  const obs = document.getElementById("cand-obs")?.value?.trim()||"";
  btn.disabled=true; btn.textContent="Enviando...";

  try {
    const p = proposals.find(x=>x.id===proposalId);
    await addDoc(collection(db,"mktCandidaturas"),{
      proposalId,
      proposalColecao: p?.origem||"marketplace",
      userId: currentUser.uid,
      userName: userDoc.name, userHandle: userDoc.handle,
      userAvatar: (userDoc.name||"?").substr(0,2).toUpperCase(),
      followers: userDoc.followers||0,
      marca, tipo,
      valorInflu: Number((valor*0.8).toFixed(2)),
      valorBruto: valor,
      obs, status:"pendente",
      dataCandidatura: new Date().toISOString().substr(0,10),
    });
    // Decrement vagas
    const p = proposals.find(x=>x.id===proposalId);
    if (p) {
      const vagas = (p.vagasRestantes??p.vagas??1);
      await updateDoc(doc(db,"marketplace",proposalId),{vagasRestantes:Math.max(0,vagas-1)});
    }
    closeModal();
    showToast("✅ Candidatura enviada!","#34D399");
  } catch(e) {
    btn.disabled=false; btn.textContent="✅ Confirmar candidatura";
    showToast("❌ Erro ao enviar","#F87171");
  }
};

window.enviarLink = async (candId) => {
  const link = document.getElementById(`link-${candId}`)?.value?.trim();
  if (!link) { showToast("Cole o link do post","#F87171"); return; }
  if (!link.startsWith("http")) { showToast("Link inválido","#F87171"); return; }

  const btn = document.querySelector(`[onclick="enviarLink('${candId}')"]`);
  if(btn){btn.disabled=true;btn.textContent="Enviando...";}

  try {
    await updateDoc(doc(db,"mktCandidaturas",candId),{
      linkPost: link,
      status: "aguardando_marca",
      dataEntrega: new Date().toISOString().substr(0,10),
    });
    showToast("✅ Post enviado para aprovação!","#34D399");
  } catch(e) {
    if(btn){btn.disabled=false;btn.textContent="✅ Enviar post para aprovação da marca";}
    showToast("❌ Erro ao enviar","#F87171");
  }
};

// ── SWITCH TAB
window.switchTab = (tab) => {
  activeTab = tab;
  renderPage();
};

// ── STATUS LABELS
function statusLabel(status) {
  const m = {
    pendente:         "⏳ Candidatura enviada — aguardando aprovação",
    aprovado:         "✅ Aprovado — publique e envie o link!",
    em_analise:       "🔍 Post em análise pelo admin",
    aguardando_marca: "⏳ Aguardando aprovação da marca",
    pago:             "💰 Pago com sucesso!",
    recusado:         "❌ Candidatura não aprovada",
  };
  return m[status]||status;
}

// ── MODAL
function showModal(html) {
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal").style.display  = "flex";
  document.body.style.overflow = "hidden";
}
window.closeModal = () => {
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "";
};
window.closeOverlay = (e) => { if(e.target.id==="modal") closeModal(); };

// ── TOAST
function showToast(msg, bg="#34D399") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = bg;
  t.style.color = bg==="#34D399"||bg==="#059669"?"#000":"#FFF";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}
</script>
</body>
</html>
