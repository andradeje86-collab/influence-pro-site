<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Divulgar — Influence PRO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07070F;color:#EAE8F5;min-height:100vh;max-width:480px;margin:0 auto}
    .hdr{background:#0F0F1C;border-bottom:1px solid #1A1A2E;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
    .back{width:36px;height:36px;border-radius:10px;border:1px solid #1A1A2E;background:none;color:#EAE8F5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .hdr-badge{margin-left:auto;background:linear-gradient(135deg,#7C6AF7,#EC4899);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:800;color:#FFF;display:none}
    .page{padding:16px}
    /* LOGIN */
    .login-wrap{max-width:340px;margin:48px auto;padding:0 20px}
    .login-icon{text-align:center;font-size:44px;margin-bottom:14px}
    .login-title{text-align:center;font-size:19px;font-weight:800;margin-bottom:6px}
    .login-sub{text-align:center;font-size:13px;color:#6B6880;margin-bottom:24px}
    .fld{margin-bottom:12px}
    .fld label{font-size:10px;font-weight:800;color:#6B6880;display:block;margin-bottom:4px;letter-spacing:1px}
    .fld input{width:100%;background:#0F0F1C;border:1px solid #1A1A2E;border-radius:10px;padding:13px 14px;font-size:14px;color:#EAE8F5;outline:none;font-family:inherit}
    .fld input:focus{border-color:#7C6AF744}
    .err-box{background:#F8717114;border:1px solid #F8717130;border-radius:8px;padding:9px 13px;font-size:12px;color:#F87171;margin-bottom:11px;display:none}
    .btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:15px;cursor:pointer}
    .btn-login:disabled{opacity:.5;cursor:not-allowed}
    .back-link{text-align:center;margin-top:14px}
    .back-link a{font-size:13px;color:#6B6880;text-decoration:none}
    /* LOCK */
    .lock{text-align:center;padding:48px 24px}
    .lock-icon{font-size:52px;margin-bottom:16px}
    .lock h2{font-size:21px;font-weight:800;margin-bottom:10px}
    .lock p{font-size:13px;color:#6B6880;line-height:1.7;margin-bottom:22px;max-width:300px;margin-left:auto;margin-right:auto}
    .lock-perks{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:14px;padding:16px;margin-bottom:22px;text-align:left}
    .lock-perk{font-size:13px;color:#9CA3AF;padding:4px 0}
    .btn-lock{display:inline-block;padding:13px 30px;border-radius:25px;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:15px;border:none;cursor:pointer}
    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .stat-box{border-radius:12px;padding:10px 4px;text-align:center}
    .stat-val{font-size:18px;font-weight:800}
    .stat-lbl{font-size:9px;color:#6B6880;margin-top:2px}
    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:16px}
    .tab-btn{flex:1;padding:10px 8px;border-radius:12px;border:2px solid #1A1A2E;background:#0F0F1C;color:#6B6880;font-weight:800;font-size:13px;cursor:pointer;transition:.2s}
    .tab-btn.active{border-color:#7C6AF788;background:#7C6AF718;color:#7C6AF7}
    /* CARDS */
    .card{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:16px;padding:16px;margin-bottom:12px}
    .brand-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .brand-logo{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#FFF;flex-shrink:0}
    .brand-name{font-size:15px;font-weight:800}
    .brand-meta{font-size:11px;color:#6B6880;margin-top:2px}
    .valor-box{margin-left:auto;text-align:right}
    .valor-num{font-size:20px;font-weight:800;color:#34D399}
    .valor-lbl{font-size:10px;color:#6B6880}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .tag-r{background:#F8717118;color:#F87171;border:1px solid #F8717130}
    .tag-f{background:#34D39918;color:#34D399;border:1px solid #34D39930}
    .tag-s{background:#FBBF2418;color:#FBBF24;border:1px solid #FBBF2430}
    .tag-c{background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA30}
    .tag-p{background:#1A1A2E;color:#6B6880;border:1px solid #1A1A2E}
    .briefing{background:#07070F;border-radius:10px;padding:10px 13px;font-size:12px;color:#9CA3AF;line-height:1.6;margin-bottom:10px}
    .valor-info{background:#34D39910;border:1px solid #34D39930;border-radius:10px;padding:10px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
    .progress-row{display:flex;justify-content:space-between;font-size:11px;color:#6B6880;margin-bottom:4px}
    .progress-bar{height:6px;background:#1A1A2E;border-radius:3px;overflow:hidden;margin-bottom:12px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7C6AF7,#6366F1)}
    .btn-cand{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#7C6AF7,#6366F1);color:#FFF;font-weight:800;font-size:14px;cursor:pointer}
    .btn-cand:disabled{opacity:.4;cursor:not-allowed}
    .cand-status{border-radius:10px;padding:10px 13px}
    /* MY CANDS */
    .status-pendente{background:#FBBF2410;border:1px solid #FBBF2430}
    .status-aprovado{background:#7C6AF710;border:1px solid #7C6AF730}
    .status-aguardando_marca{background:#FBBF2410;border:1px solid #FBBF2430}
    .status-em_analise{background:#A78BFA10;border:1px solid #A78BFA30}
    .status-pago{background:#34D39910;border:1px solid #34D39930}
    .status-recusado{background:#F8717110;border:1px solid #F8717130}
    .link-input{width:100%;background:#07070F;border:1px solid #1A1A2E;border-radius:9px;padding:10px 12px;font-size:13px;color:#EAE8F5;outline:none;margin-bottom:8px;font-family:inherit}
    .link-input:focus{border-color:#34D39944}
    .btn-link{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#34D399,#059669);color:#FFF;font-weight:700;font-size:13px;cursor:pointer}
    .btn-link:disabled{opacity:.4;cursor:not-allowed}
    /* EMPTY */
    .empty{text-align:center;padding:40px 20px;color:#6B6880}
    .empty-icon{font-size:40px;margin-bottom:12px}
    /* MODAL */
    .overlay{position:fixed;inset:0;background:#000000CC;z-index:100;display:flex;align-items:flex-end}
    .sheet{background:#0F0F1C;border:1px solid #1A1A2E;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88vh;overflow-y:auto}
    .handle{width:38px;height:4px;background:#1A1A2E;border-radius:2px;margin:0 auto 18px}
    .btn-outline{width:100%;padding:10px;border-radius:10px;border:1px solid #1A1A2E;background:transparent;color:#6B6880;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px}
    .obs-area{width:100%;background:#07070F;border:1px solid #1A1A2E;border-radius:9px;padding:10px 12px;font-size:13px;color:#EAE8F5;outline:none;min-height:65px;resize:none;font-family:inherit;margin-bottom:12px}
    .obs-area:focus{border-color:#7C6AF744}
    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:22px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<div class="hdr">
  <button class="back" onclick="history.back()">←</button>
  <div>
    <div style="font-size:16px;font-weight:800">📣 Divulgar</div>
    <div style="font-size:10px;color:#6B6880">Marketplace de marcas</div>
  </div>
  <div class="hdr-badge" id="plan-badge">✦ PRO</div>
</div>

<div class="page" id="main">
  <div style="text-align:center;padding:60px 20px">
    <div style="display:inline-block;width:32px;height:32px;border:3px solid #1A1A2E;border-top-color:#7C6AF7;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px"></div>
    <div style="color:#6B6880;font-size:13px">Carregando...</div>
  </div>
</div>

<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="modal-body"><div class="handle"></div></div>
</div>
<div class="toast" id="toast"></div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script type="module">
import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, addDoc, updateDoc, onSnapshot, query, where }
                                   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword }
                                   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ── Firebase
const app = initializeApp({
  apiKey:"AIzaSyD7rv-cygkLUyTZydUV3SLe2GH7DV30_Yc",
  authDomain:"influencer-pro-1b9b0.firebaseapp.com",
  projectId:"influencer-pro-1b9b0",
  storageBucket:"influencer-pro-1b9b0.firebasestorage.app",
  messagingSenderId:"234691340961",
  appId:"1:234691340961:web:0298046c2c50252a0b5ee0",
});
const db   = getFirestore(app);
const auth = getAuth(app);

// ── State
let me         = null;  // fireUser
let userDoc    = null;
let isPrem     = false;
let activeTab  = "oportunidades";
let proposals  = [];
let myCands    = [];
let unsubs     = [];

// ── Helpers
const $ = id => document.getElementById(id);
function toast(msg, bg="#34D399") {
  const t=$("toast"); t.textContent=msg; t.style.background=bg;
  t.style.color=bg==="#34D399"||bg==="#059669"?"#000":"#FFF";
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000);
}
window.closeModal = () => { $("modal").style.display="none"; };

// ── RENDER MAIN
function renderMain() {
  const total  = proposals.length;
  const nCands = myCands.length;
  const pagos  = myCands.filter(c=>c.status==="pago").length;
  const ganhos = myCands.filter(c=>c.status==="pago").reduce((a,b)=>a+(b.valorInflu||0),0);

  $("main").innerHTML = `
    <div class="stats-grid">
      ${[
        {v:total,  l:"Oportunidades", c:"#7C6AF7"},
        {v:nCands, l:"Candidaturas",  c:"#FBBF24"},
        {v:pagos,  l:"Pagos",         c:"#34D399"},
        {v:"R$"+ganhos.toFixed(0), l:"Ganhos", c:"#34D399"},
      ].map(s=>`<div class="stat-box" style="background:${s.c}0C;border:1px solid ${s.c}28">
        <div class="stat-val" style="color:${s.c}">${s.v}</div>
        <div class="stat-lbl">${s.l}</div>
      </div>`).join("")}
    </div>
    <div class="tabs">
      <button class="tab-btn ${activeTab==="oportunidades"?"active":""}" onclick="switchTab('oportunidades')">🏪 Oportunidades</button>
      <button class="tab-btn ${activeTab==="minhas"?"active":""}" onclick="switchTab('minhas')">📋 Minhas (${nCands})</button>
    </div>
    <div id="tab-content"></div>`;

  renderTab();
}

function renderTab() {
  const c = $("tab-content");
  if (!c) return;

  if (activeTab === "oportunidades") {
    if (!proposals.length) {
      c.innerHTML = `<div class="empty">
        <div class="empty-icon">🏪</div>
        <p>Nenhuma oportunidade disponível agora.<br/>Volte em breve!</p>
        <div style="margin-top:16px;background:#7C6AF710;border:1px solid #7C6AF730;border-radius:12px;padding:12px;font-size:12px;color:#9CA3AF;line-height:1.6;text-align:left">
          💡 Você também pode ganhar indicando amigos pelo seu link na aba <strong style="color:#EAE8F5">Rede</strong> no app.
        </div>
      </div>`;
      return;
    }
    c.innerHTML = proposals.map(p => propCard(p)).join("");
    return;
  }

  if (!myCands.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Você ainda não se candidatou a nenhuma oportunidade.</p></div>`;
    return;
  }
  c.innerHTML = myCands.map(c2 => candCard(c2)).join("");
}

// ── PROPOSAL CARD
function propCard(p) {
  const cand    = myCands.find(c=>c.proposalId===p.id);
  const vLiq    = (p.valor*0.8).toFixed(2);
  const vagas   = p.vagasRestantes ?? p.vagas ?? 0;
  const pct     = Math.min(100, Math.round(((p.vagas||1)-vagas)/(p.vagas||1)*100));
  const tcls    = {Reels:"tag-r",Feed:"tag-f",Story:"tag-s",Campanha:"tag-c"}[p.tipo]||"tag-p";
  const tEmoji  = {Reels:"🎬",Feed:"📸",Story:"📱",Campanha:"📦"}[p.tipo]||"📌";
  const cor     = {Reels:"#F87171",Feed:"#34D399",Story:"#FBBF24",Campanha:"#A78BFA"}[p.tipo]||"#7C6AF7";

  return `<div class="card">
    <div class="brand-row">
      <div class="brand-logo" style="background:linear-gradient(135deg,${cor},${cor}88)">${(p.marca||"?").substr(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="brand-name">${p.marca}</div>
        <div class="brand-meta">Publicado via Influence PRO</div>
      </div>
      <div class="valor-box">
        <div class="valor-num">R$ ${vLiq}</div>
        <div class="valor-lbl">você recebe</div>
      </div>
    </div>
    <div class="tags">
      <span class="tag ${tcls}">${tEmoji} ${p.tipo}</span>
      <span class="tag tag-p">⏰ ${p.prazo||"7 dias"}</span>
      <span class="tag tag-p">👥 ${vagas} vaga${vagas!==1?"s":""}</span>
    </div>
    <div class="briefing">${p.briefing||"—"}</div>
    <div class="valor-info">
      <div>
        <div style="font-size:13px;font-weight:800;color:#34D399">💰 Você recebe: R$ ${vLiq}</div>
        <div style="font-size:10px;color:#6B6880;margin-top:2px">🔒 Pago via PIX após aprovação da marca</div>
      </div>
    </div>
    <div class="progress-row"><span>${(p.vagas||0)-vagas} de ${p.vagas||0} preenchidas</span><span style="color:#7C6AF7;font-weight:700">${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${!cand
      ? `<button class="btn-cand" onclick="openCandModal('${p.id}')">🙋 Candidatar-se</button>`
      : `<div class="cand-status" style="background:#7C6AF718;border:1px solid #7C6AF730;text-align:center">
           <div style="font-size:13px;font-weight:700;color:#7C6AF7">${statusLabel(cand.status)}</div>
           ${cand.status==="aprovado"?'<div style="font-size:11px;color:#6B6880;margin-top:3px">Vá em "Minhas candidaturas" para enviar o link</div>':""}
         </div>`
    }
  </div>`;
}

// ── CANDIDATURE CARD
function candCard(cand) {
  const sc = {pendente:"#FBBF24",aprovado:"#7C6AF7",aguardando_marca:"#FBBF24",em_analise:"#A78BFA",pago:"#34D399",recusado:"#F87171"}[cand.status]||"#6B6880";
  const cor = {Reels:"#F87171",Feed:"#34D399",Story:"#FBBF24",Campanha:"#A78BFA"}[cand.tipo]||"#7C6AF7";
  return `<div class="card status-${cand.status}" style="border-color:${sc}44">
    <div class="brand-row" style="margin-bottom:10px">
      <div class="brand-logo" style="background:linear-gradient(135deg,${cor},${cor}88)">${(cand.marca||"?").substr(0,2).toUpperCase()}</div>
      <div style="flex:1">
        <div class="brand-name">${cand.marca}</div>
        <div class="brand-meta">${cand.tipo} · ${cand.dataCandidatura||"—"}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:16px;font-weight:800;color:#34D399">R$ ${(cand.valorInflu||0).toFixed(2)}</div>
        <div style="font-size:10px;color:#6B6880">💰 via PIX</div>
      </div>
    </div>
    <div style="background:${sc}18;border:1px solid ${sc}44;border-radius:10px;padding:10px 13px;margin-bottom:${cand.status==="aprovado"?"10px":"0"}">
      <div style="font-size:13px;font-weight:700;color:${sc}">${statusLabel(cand.status)}</div>
      ${cand.status==="pendente"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">Aguardando análise do admin.</div>':""}
      ${cand.status==="aguardando_marca"?'<div style="font-size:11px;color:#6B6880;margin-top:2px">Post enviado. Aguardando aprovação da marca. Pagamento bloqueado até lá.</div>':""}
      ${cand.status==="pago"?`<div style="font-size:11px;color:#34D399;margin-top:2px">🎉 Pago em ${cand.dataPagamento||"—"}</div>`:""}
    </div>
    ${cand.status==="aprovado"?`
      <div style="font-size:10px;font-weight:800;color:#6B6880;letter-spacing:1px;margin-bottom:6px">COLE O LINK DO POST PUBLICADO</div>
      <input class="link-input" id="link-${cand.id}" placeholder="https://instagram.com/p/..."/>
      <button class="btn-link" onclick="enviarLink('${cand.id}')">✅ Enviar para aprovação da marca</button>
      <div style="font-size:11px;color:#34D399;margin-top:6px;text-align:center">💰 R$ ${(cand.valorInflu||0).toFixed(2)} liberado após aprovação</div>
    `:""}
    ${cand.status==="aguardando_marca"||cand.status==="em_analise"?`
      <div style="background:#A78BFA10;border-radius:8px;padding:8px 11px;margin-top:8px;display:flex;gap:8px;align-items:center">
        <span>🔗</span>
        <a href="${cand.linkPost}" target="_blank" style="font-size:12px;color:#A78BFA;word-break:break-all">${cand.linkPost||"—"}</a>
      </div>
    `:""}
  </div>`;
}

function statusLabel(s) {
  return {
    pendente:         "⏳ Aguardando aprovação",
    aprovado:         "✅ Aprovado — publique e envie o link!",
    em_analise:       "🔍 Post em análise",
    aguardando_marca: "⏳ Aguardando aprovação da marca",
    pago:             "💰 Pago com sucesso!",
    recusado:         "❌ Não aprovado desta vez",
  }[s]||s;
}

// ── CANDIDATURA MODAL
window.openCandModal = (proposalId) => {
  const p = proposals.find(x=>x.id===proposalId);
  if (!p) return;
  const vLiq = (p.valor*0.8).toFixed(2);
  $("modal-body").innerHTML = `
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">🙋 Candidatar-se</div>
    <div style="font-size:12px;color:#6B6880;margin-bottom:16px">${p.marca} · ${p.tipo}</div>
    <div style="background:#34D39910;border:1px solid #34D39930;border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:26px;font-weight:800;color:#34D399">R$ ${vLiq}</div>
      <div style="font-size:12px;color:#6B6880;margin-top:4px">Você recebe via PIX após aprovação da marca</div>
    </div>
    <div style="background:#7C6AF710;border:1px solid #7C6AF730;border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:12px;color:#9CA3AF;line-height:1.6">
      💡 Ao se candidatar, o admin analisa seu perfil. Se aprovado, você recebe o briefing e publica o post. O pagamento fica bloqueado até a marca aprovar.
    </div>
    <div style="font-size:10px;font-weight:800;color:#6B6880;letter-spacing:1px;margin-bottom:5px">OBSERVAÇÃO (opcional)</div>
    <textarea class="obs-area" id="cand-obs" placeholder="Ex: Tenho 12k seguidores, nicho fitness, engajamento 5%..."></textarea>
    <button class="btn-cand" id="btn-conf-cand" onclick="confirmar('${proposalId}',${p.valor},'${p.marca}','${p.tipo}')">✅ Confirmar candidatura</button>
    <button class="btn-outline" onclick="closeModal()">Cancelar</button>`;
  $("modal").style.display = "flex";
};

window.confirmar = async (proposalId, valor, marca, tipo) => {
  const btn = $("btn-conf-cand");
  const obs = $("cand-obs")?.value?.trim()||"";
  btn.disabled = true; btn.textContent = "Enviando...";
  try {
    await addDoc(collection(db,"mktCandidaturas"),{
      proposalId, userId: me.uid,
      userName: userDoc.name, userHandle: userDoc.handle||userDoc.username||"",
      userAvatar: (userDoc.name||"?").substr(0,2).toUpperCase(),
      followers: userDoc.followers||0,
      marca, tipo,
      valorInflu: Number((valor*0.8).toFixed(2)),
      valorBruto: valor,
      obs, status:"pendente",
      dataCandidatura: new Date().toISOString().substr(0,10),
    });
    const p = proposals.find(x=>x.id===proposalId);
    if (p) {
      const col = p.origem==="marcasPropostas" ? "marcasPropostas" : "marketplace";
      await updateDoc(doc(db,col,proposalId),{vagasRestantes:Math.max(0,(p.vagasRestantes??p.vagas??1)-1)});
    }
    closeModal();
    toast("✅ Candidatura enviada!","#34D399");
  } catch(e) {
    btn.disabled=false; btn.textContent="✅ Confirmar candidatura";
    toast("❌ Erro ao enviar","#F87171");
  }
};

window.enviarLink = async (candId) => {
  const link = $(`link-${candId}`)?.value?.trim();
  if (!link) { toast("Cole o link do post","#F87171"); return; }
  if (!link.startsWith("http")) { toast("Link inválido","#F87171"); return; }
  const btn = document.querySelector(`[onclick="enviarLink('${candId}')"]`);
  if (btn) { btn.disabled=true; btn.textContent="Enviando..."; }
  try {
    await updateDoc(doc(db,"mktCandidaturas",candId),{
      linkPost: link, status:"aguardando_marca",
      dataEntrega: new Date().toISOString().substr(0,10),
    });
    toast("✅ Post enviado!","#34D399");
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent="✅ Enviar para aprovação da marca"; }
    toast("❌ Erro","#F87171");
  }
};

window.switchTab = (tab) => { activeTab=tab; renderMain(); };

  $("main").innerHTML = `
    <div class="login-wrap">
      <div class="login-icon">📣</div>
      <div class="login-title">Marketplace de Divulgação</div>
      <div class="login-sub">Entre com sua conta do Influence PRO</div>
      <div class="fld">
        <label>Usuário</label>
        <input id="usuário" type="usuário" placeholder="seuusuario" autocomplete="usuário"/>
      </div>
      <div class="fld">
        <label>SENHA</label>
        <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn-login" id="l-btn" onclick="doLogin()">Entrar</button>
      <div class="back-link"><a href="https://app.influpro.com.br">← Voltar ao app</a></div>

  if (errMsg) $("l-err").style.display="block";
  $("l-pass")?.addEventListener("keyup", e=>{ 
if(e.key==="Enter") doLogin();

window.doLogin = async () => {
  const email = $("usuário")?.value?.trim();
  const pass  = $("l-pass")?.value?.trim();
  const btn   = $("l-btn");
  const err   = $("l-err");
  if (! usuário||!pass) return;
  err.style.display="none";
  btn.disabled=true; btn.textContent="Entrando...";
  try {
    const cred = await signInWithEmailAndPassword(auth, usuario, pass);
    // onAuthStateChanged will pick up and render
  } catch(e) {

// ── LISTENERS
function startListeners() {
  unsubs.forEach(u=>u());
  unsubs=[];
  // Proposals from marcasPropostas (approved)
  unsubs.push(onSnapshot(
    query(collection(db,"marcasPropostas"), where("status","==","ativo")),
    snap=>{
      const direct = snap.docs.map(d=>({id:d.id,origem:"marcasPropostas",...d.data()}));
      proposals = [...direct].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderMain();
    }
  ));
  // My candidatures
  unsubs.push(onSnapshot(
    query(collection(db,"mktCandidaturas"), where("userId","==",me.uid)),
    snap=>{
      myCands = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderMain();
    }
  ));
}

// ── AUTH — runs after all functions defined
onAuthStateChanged(auth, async fireUser => {
  if (!fireUser) {
    showLogin();
    return;
  }
  try {
    const snap = await getDoc(doc(db,"users",fireUser.uid));
    if (!snap.exists()) { showLogin("Usuário não encontrado"); return; }
    me      = fireUser;
    userDoc = {id:snap.id,...snap.data()};
    const today = new Date().toISOString().substr(0,10);
    isPrem  = userDoc.plan==="premium" && (!userDoc.planExpiry || userDoc.planExpiry>=today);
    if (userDoc.isAdmin) isPrem=true;
    $("plan-badge").style.display = isPrem?"flex":"none";
    if (!isPrem) { showLock(); return; }
    startListeners();
  } catch(e) {
    showLogin("Erro ao carregar. Tente novamente.");
  }
});
</script>
