<script>

    apiKey:            "AIzaSyD7rv-cygkLUyTZydUV3SLe2GH7DV30_Yc",
    authDomain:        "influencer-pro-1b9b0.firebaseapp.com",
    projectId:         "influencer-pro-1b9b0",
    storageBucket:     "influencer-pro-1b9b0.firebasestorage.app",
    messagingSenderId: "234691340961",
    appId:             "1:234691340961:web:0298046c2c50252a0b5ee0",
    measurementId:     "G-T7V2SLW4E6"
  };

  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();

  window.FB_DB   = db;
  window.FB_AUTH = auth;
  window.fbGet = (col,id) =>
    db.collection(col).doc(id).get()
      .then(d => d.exists ? {id:d.id,...d.data()} : null);

  window.fbSet = (col,id,data) =>
    db.collection(col).doc(id).set({...data, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

  window.fbAdd = (col,data) =>
    db.collection(col).add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(r => ({id:r.id}));

  window.fbUpdate = (col,id,data) =>
    db.collection(col).doc(id).update({...data, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

  window.fbDelete = (col,id) =>
    db.collection(col).doc(id).delete();

  window.fbQuery = (col,field,val) =>
    db.collection(col).where(field,"==",val).get()
      .then(s => s.docs.map(d=>({id:d.id,...d.data()})));

  window.fbListen = (col,field,val,cb) =>
    db.collection(col).where(field,"==",val)
      .onSnapshot(s => cb(s.docs.map(d=>({id:d.id,...d.data()}))));

  window.fbListenAll = (col,cb) =>
    db.collection(col).onSnapshot(s => cb(s.docs.map(d=>({id:d.id,...d.data()}))));

  window.fbSignIn  = (e,p) => auth.signInWithEmailAndPassword(e,p);
  window.fbSignUp  = (e,p) => auth.createUserWithEmailAndPassword(e,p);
  window.fbSignOut = ()    => auth.signOut();
  window.fbOnAuth  = (cb)  => auth.onAuthStateChanged(cb);

  window.FB_READY = true;
  console.log("✅ Firebase Compat conectado!");
</script>

/* ─── LOGIN ─── */
function LoginScreen({onLogin,onGoRegister,t,themeToggle,theme}) {
  const [username,setUsername] = useState("");
  const [pass,setPass]         = useState("");
  const [err,setErr]           = useState("");
  const [loading,setLoading]   = useState(false);

  const submit = async () => {
    if(!username.trim()){setErr("Informe seu usuário.");return;}
    if(!pass){setErr("Informe sua senha.");return;}
    setErr(""); setLoading(true);
    try {
      // Admin login
      if(username.trim().toLowerCase()==="admin"&&pass==="admin123"){
        try{localStorage.setItem("ip_admin_session","true");}catch(e){}
        onLogin({isAdmin:true,name:"Administrador",avatar:"AD",uid:"admin"});
        return;
      }
      const users = await fsQuery("users","username",username.trim().toLowerCase());
      if(!users.length){setErr("Usuário não encontrado.");setLoading(false);return;}
      const user = users[0];
      await fbSignIn(user.email, pass);
      onLogin(user);
    } catch(e) {
      console.error("Login error:", e);
      if(e.code === "auth/user-not-found" || e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
        setErr("Usuário ou senha incorretos.");
      } else if(e.code === "auth/network-request-failed") {
        setErr("Sem conexão com internet.");
      } else {
        setErr("Erro: " + (e.message || e.code || "tente novamente"));
      }
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"32px 24px",background:t.bg}}>
      <style>{makeCSS(t)}</style>
      {t.grad&&<div style={{height:3,background:t.grad,position:"sticky",top:0,zIndex:100,flexShrink:0}}/>}
      <div style={{position:"absolute",top:20,right:20}}>
        <button onClick={themeToggle} className="s" style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"6px 12px",color:t.sub,cursor:"pointer",fontSize:16}}>{theme==="dark"?"☀️":theme==="light"?"📷":"🌙"}</button>
      </div>
      <div className="fi" style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:58,letterSpacing:4,background:`linear-gradient(135deg,${t.accent},#EC4899)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>INFLUENCE</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:8,color:t.sub}}>PRO</div>
        <div style={{fontSize:12,color:t.sub,marginTop:8}}>Gestão para micro influenciadores</div>
      </div>
      <div className="fi2" style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:20,padding:24}}>
        <div style={{fontSize:17,fontWeight:800,marginBottom:4,color:t.text}}>Entrar na sua conta</div>
        <div style={{fontSize:12,color:t.sub,marginBottom:24}}>Bem-vindo de volta 👋</div>
        <Fld label="USUÁRIO" value={username} onChange={e=>setUsername(e.target.value)} placeholder="seu_usuario" onKeyDown={e=>e.key==="Enter"&&submit()} t={t}/>
        <Fld label="SENHA"   value={pass}     onChange={e=>setPass(e.target.value)}     placeholder="••••••" type="password" onKeyDown={e=>e.key==="Enter"&&submit()} t={t}/>
        <ErrBox msg={err}/>
        <PBtn onClick={submit} t={t} disabled={loading}>{loading?"Entrando...":"Entrar"}</PBtn>
      </div>
      <div className="fi3" style={{textAlign:"center",marginTop:20}}>
        <span style={{fontSize:13,color:t.sub}}>Não tem conta? </span>
        <button onClick={onGoRegister} style={{background:"none",border:"none",color:t.accent,fontWeight:700,fontSize:13,cursor:"pointer"}}>Cadastrar-se</button>
      </div>
    </div>
  );
}

function RegisterScreen({onBack,onRegister,t}) {

  const urlParams = new URLSearchParams(window.location.search);
  const hashParams = new URLSearchParams(window.location.hash.replace('#',''));

  const [plan,setPlan]       = useState("free");

    if(step===1){
      if(!name.trim()||!username.trim()||!email.trim()||pass.length<6){setErr("Preencha todos os campos (senha mín. 6 caracteres).");return;}

      try {
        const existing = await fsQuery("users","username",username.trim().toLowerCase());
        if(existing.length){setErr("Usuário já existe. Escolha outro.");return;}
      } catch(indexErr) {
        console.warn("Username check skipped:", indexErr.message);
      }
      setErr(""); setStep(2);
    } else {
      setLoading(true);
      try {
        // 1. Criar auth user
        const cred = await fbSignUp(email.trim(), pass);
        const uid  = cred.user.uid;
        const refId = genRefId(name);
        let referredBy = null;
        if(refCode.trim()){
          const refs = await fsQuery("users","referralId",refCode.trim().toUpperCase());
          if(refs.length) referredBy = refs[0].id;
        }
        const newUser = {
          uid, email:email.trim(),
          name:name.trim(),
          handle:`@${username.trim().toLowerCase()}`,
          username:username.trim().toLowerCase(),
          plan:"free", avatar:name.trim().split(" ").map(w=>w[0]).join("").substr(0,2).toUpperCase(),
          followers:0, referralId:refId,
          referredBy, joinDate:new Date().toISOString().substr(0,10),
          planRequestedAt: plan==="premium" ? new Date().toISOString() : null,
          planExpiry: null,
          balance:0, pixKey:"", monthlyEarnings:0, totalEarnings:0,
          role:"user",
        };
        await fsSet("users", uid, newUser);
        if(referredBy){
          const commission = plan==="premium"?1.00:0;
          await fsAdd("referrals",{
            referrerId:referredBy, referredId:uid,
            referredName:newUser.name, referredPlan:plan,
            level:1, commission, date:new Date().toISOString().substr(0,7),
          });
          // Nível 2
          const lvl1User = await fsGet("users", referredBy);
          if(lvl1User?.referredBy){
            await fsAdd("referrals",{
              referrerId:lvl1User.referredBy, referredId:uid,
              referredName:newUser.name, referredPlan:plan,
              level:2, commission:plan==="premium"?0.50:0,
              date:new Date().toISOString().substr(0,7),
            });
            // Nível 3
            const lvl2User = await fsGet("users", lvl1User.referredBy);
            if(lvl2User?.referredBy){
              await fsAdd("referrals",{
                referrerId:lvl2User.referredBy, referredId:uid,
                referredName:newUser.name, referredPlan:plan,
                level:3, commission:plan==="premium"?0.30:0,
                date:new Date().toISOString().substr(0,7),
              });
            }
          }
        }
        if(plan==="premium"){
          alert("Conta criada! ✅\n\nVocê selecionou o plano Premium.\nPague R$ 10,00 via PIX: 2d970c88-833f-441d-bbe1-a0777afaa629\n\nApós o pagamento, o admin ativará seu Premium em até 24h.");
        }
        onRegister({...newUser, id:uid});
      } catch(e) {
        console.error("Register error:", e);
        if(e.code === "auth/email-already-in-use") setErr("E-mail já cadastrado.");
        else if(e.code === "auth/weak-password") setErr("Senha muito fraca. Use pelo menos 6 caracteres.");

  ];

        <button onClick={step>1?()=>{setErr("");setStep(1);}:onBack} style={{background:t.surface,border:`1px solid ${t.border}`,color:t.sub,borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:18}}>←</button>

        {step===2&&(

              <div key={p.key} onClick={()=>setPlan(p.key)} className="s"
                style={{background:plan===p.key?`${p.color}14`:t.inputBg,border:`2px solid ${plan===p.key?p.color:t.border}`,borderRadius:16,padding:16,marginBottom:10,cursor:"pointer",position:"relative"}}>
                {p.badge&&<div style={{position:"absolute",top:-9,right:12,background:p.color,color:"#FFF",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:10}}>{p.badge}</div>}

function MainApp({user,t,themeToggle,theme,onLogout}) {
  const [tab,setTab]             = useState("dashboard");
  const [publis,setPublis]       = useState([]);
  const [checklist,setChecklist] = useState([]);
  const [withdrawals,setWithdrawals] = useState([]);
  const [referrals,setReferrals] = useState([]);
  const [goals,setGoals]         = useState([]);
  const [upline,setUpline]       = useState(null);
  const [calMonth,setCalMonth]   = useState(new Date().getMonth());
  const [calYear,setCalYear]     = useState(new Date().getFullYear());
  const [selDay,setSelDay]       = useState(null);
  const [showNew,setShowNew]     = useState(false);
  const [editingPubli,setEditingPubli] = useState(null);
  const [showWith,setShowWith]   = useState(false);
  const [goldSaldo,setGoldSaldo] = useState(0);
  const [lastCheckin,setLastCheckin] = useState(null);
  const [checkinStreak,setCheckinStreak] = useState(0);
  const [showPlans,setShowPlans] = useState(false);
  const [pixCopied,setPixCopied]   = useState(false);
  const [showPix,setShowPix]       = useState(false);
  const [editGoal,setEditGoal]   = useState(null);
  const [tipIdx]                 = useState(Math.floor(Math.random()*TIPS.length));
  const [copied,setCopied]       = useState(false);
  const [filterT,setFilterT]     = useState("todos");
  const [filterP,setFilterP]     = useState("todos");
  const [dismissed,setDismissed] = useState([]);
  const [showAddCal,setShowAddCal]=useState(false);
  const [showCampanha,setShowCampanha]=useState(false);
  const [editingCampanha,setEditingCampanha]=useState(null);
  const [pixKey,setPixKey]       = useState(user.pixKey||"");
  const [loadingData,setLoadingData] = useState(true);
  const [fixing,setFixing]           = useState(false);
  const [fixResult,setFixResult]     = useState("");

  const uid = user.id || user.uid;
  useEffect(()=>{
    if(withdrawals.length>0){
      console.log("Withdrawals carregados:", withdrawals.length, withdrawals.map(w=>({id:w.id,status:w.status,amount:w.amount})));
    }
  },[withdrawals]);
  useEffect(() => {
    if(!uid) return;
    setLoadingData(true);
    const unsubs = [];

    // Publis
    unsubs.push(fsListen("publis","userId",uid, data => setPublis(data)));
    // Checklist
    unsubs.push(fsListen("checklist","userId",uid, data => setChecklist(data)));
    unsubs.push(fsListen("withdrawals","userId",uid, data => {
      setWithdrawals(prev => {
        const ids = new Set(data.map(d=>d.id));
        const others = prev.filter(p=>!ids.has(p.id));
        return [...data, ...others.filter(o=>o.userId===uid||o.uid===uid)];
      });
    }));
    unsubs.push(fsListen("referrals","referrerId",uid, data => setReferrals(data)));

    fsGet("goals", uid+"_gold").then(d => {
      if(d) {
        setGoldSaldo(d.saldo||0);
        setLastCheckin(d.lastCheckin||null);
        setCheckinStreak(d.streak||0);
      }
    }).catch(()=>{});
    fsGet("goals", uid).then(d => {
      if(d?.items) setGoals(d.items);
      else setGoals([
        {id:1,title:"Seguidores",current:0,target:50000,unit:"",icon:"👥"},
        {id:2,title:"Publis no Mês",current:0,target:8,unit:"",icon:"📸"},
        {id:3,title:"Faturamento Mês",current:0,target:5000,unit:"R$",icon:"💰"},
        {id:4,title:"Engajamento",current:0,target:6.0,unit:"%",icon:"🔥"},
      ]);
    });
    if(user.referredBy){
      fsGet("users", user.referredBy).then(u => setUpline(u));
    }

    setTimeout(()=>setLoadingData(false), 1200);
    return () => unsubs.forEach(u=>u());
  }, [uid]);

  const saveGoals = async (newGoals) => {
    setGoals(newGoals);
    await fsSet("goals", uid, {items:newGoals, userId:uid});
  };

  const today   = new Date().toISOString().substr(0,10);
  const urgents = publis.filter(p=>p.status!=="postado"&&p.delivery<=today&&!dismissed.includes(p.id));
  const dueSoon = publis.filter(p=>{const d=(new Date(p.delivery)-new Date())/86400000;return d>=0&&d<=2&&p.status!=="postado"&&!dismissed.includes(p.id);});
  const alerts  = [...new Map([...urgents,...dueSoon].map(x=>[x.id,x])).values()];

  const today2 = new Date().toISOString().substr(0,10);
  const isPrem   = user.plan==="premium" && (!user.planExpiry || user.planExpiry >= today2);
  const baseUrl  = window.location.origin + window.location.pathname;
  const refLink  = `${baseUrl}?ref=${user.referralId}`;
  const refLinkFull = refLink;
  const filtered = publis.filter(p=>(filterT==="todos"||p.type===filterT)&&(filterP==="todos"||p.payment===filterP));
  const lvl1     = referrals.filter(r=>r.level===1);
  const lvl2     = referrals.filter(r=>r.level===2);
  const lvl3     = referrals.filter(r=>r.level===3);
  const totRef         = referrals.reduce((a,r)=>a+r.commission,0);
  const totalSacado    = withdrawals.filter(w=>w.status==="pago").reduce((a,b)=>a+(b.amount||0),0);
  const totalPendente  = withdrawals.filter(w=>w.status==="aguardando").reduce((a,b)=>a+(b.amount||0),0);
  const saldoDisponivel= Math.max(0, totRef - totalSacado - totalPendente);

        </div>

      {alerts.length>0&&tab==="dashboard"&&(

              <div style={{fontSize:12,color:"#FCA5A5",flex:1}}><b>{p.status==="atrasado"?"ATRASADO:":"HOJE:"}</b> poste {TYPE_LABEL[p.type]} da <b>{p.brand}</b></div>
              <button onClick={()=>setDismissed(prev=>[...prev,p.id])} style={{background:"none",border:"none",color:"#F87171",cursor:"pointer",fontSize:18,padding:"0 4px"}}>✕</button>
            </div>
          ))}
        </div>
      )}

      <div style={{padding:"16px 16px 100px",overflowY:"auto",maxHeight:"calc(100vh - 130px)"}}>

        {/* ══ DASHBOARD ══ */}

          <div className="fi">
            <CheckInButton uid={uid} goldSaldo={goldSaldo} setGoldSaldo={setGoldSaldo} lastCheckin={lastCheckin} setLastCheckin={setLastCheckin} checkinStreak={checkinStreak} setCheckinStreak={setCheckinStreak} t={t} fsSet={fsSet}/>
            <div style={{background:`linear-gradient(135deg,${t.accent}22,#6366F122)`,border:`1px solid ${t.accent}33`,borderRadius:18,padding:20,marginBottom:14}}>

              <div style={{fontSize:36,fontWeight:800,letterSpacing:-1,color:t.text}}>R$ {totPago.toLocaleString("pt-BR")}</div>
              <div style={{fontSize:11,color:t.sub,marginTop:2}}>+ {totPerm} permutas</div>
            </div>
            {(()=>{
              const now = new Date();
              const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
              const weekEnd   = new Date(now); weekEnd.setDate(now.getDate() + (6 - now.getDay()));
              const ws = weekStart.toISOString().substr(0,10);
              const we = weekEnd.toISOString().substr(0,10);
              const semana   = publis.filter(p=>p.delivery>=ws&&p.delivery<=we);
              const pendSem  = semana.filter(p=>p.status!=="postado");
              const atraso   = publis.filter(p=>p.status==="atrasado");
              const mes      = publis.filter(p=>p.delivery&&p.delivery.substr(0,7)===today.substr(0,7));
              return (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <Card t={t} style={{padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:t.sub,fontWeight:700,marginBottom:4}}>PUBLIS DA SEMANA</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#FBBF24"}}>{semana.length}</div>
                    <div style={{fontSize:10,color:t.sub}}>{pendSem.length} pendentes</div>

                    <div style={{fontSize:10,color:t.sub}}>{publis.filter(p=>p.payment==="pago"&&p.delivery&&p.delivery.substr(0,7)===today.substr(0,7)).length} pagas</div>

                    <div style={{fontSize:10,color:t.sub}}>requerem atenção</div>

                    <div style={{fontSize:10,color:t.sub}}>{referrals.length} indicados</div>
                  </Card>
                </div>

            <Card t={t} style={{marginBottom:14}}>

              <div style={{background:t.inputBg,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,marginBottom:10}}>

                  style={{background:copied?"#34D39918":t.accentSoft,color:copied?"#34D399":t.accent,border:`1px solid ${copied?"#34D39930":t.accent+"30"}`,borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:800,cursor:"pointer",flexShrink:0}}>

              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {[{label:"👥 Indicados",val:referrals.length},{label:"💰 Este mês",val:`R$ ${(user.monthlyEarnings||0).toFixed(2)}`},{label:"💳 Saldo p/ saque",val:`R$ ${saldoDisponivel.toFixed(2)}`}].map(s=>(
                  <div key={s.label} style={{background:t.inputBg,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:t.sub,marginBottom:4}}>{s.label}</div>
                    <div style={{fontSize:13,fontWeight:800,color:t.accent}}>{s.val}</div>

                ))}
              </div>
            </Card>
            <SecTitle t={t}>ÚLTIMAS PUBLIS</SecTitle>
            {publis.length===0&&<div style={{textAlign:"center",padding:24,color:t.sub,fontSize:13}}>Nenhuma publi ainda. Toque em + para adicionar!</div>}
            {publis.slice(0,4).map(p=>(

                <div style={{width:42,height:42,borderRadius:10,background:`${TYPE_COLOR[p.type]}18`,border:`1px solid ${TYPE_COLOR[p.type]}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:TYPE_COLOR[p.type],flexShrink:0}}>{p.img}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:3,color:t.text}}>{p.brand}</div>

                    <Pill label={TYPE_LABEL[p.type]} color={TYPE_COLOR[p.type]}/>

                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:14,fontWeight:800,color:t.text}}>{p.payment==="pago"?`R$ ${p.value}`:"Permuta"}</div>

                </div>
              </div>
            ))}

        {/* ══ PUBLIS ══ */}
        {tab==="publis"&&(
          <div className="fi">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:t.text}}>Minhas Publis</div>
                <div style={{fontSize:11,color:t.sub}}>{publis.length} publicações</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowCampanha(true)} className="s" style={{background:"linear-gradient(135deg,#A78BFA,#7C3AED)",border:"none",borderRadius:12,padding:"8px 12px",color:"#FFF",fontWeight:800,fontSize:12,cursor:"pointer"}}>📦 Campanha</button>
                <button onClick={()=>setShowNew(true)} className="s" style={{background:`linear-gradient(135deg,${t.accent},#6366F1)`,border:"none",borderRadius:12,padding:"8px 16px",color:"#FFF",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Nova</button>
              </div>
            </div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
              {["todos","reels","feed","story","campanha"].map(f=>(
                <button key={f} onClick={()=>setFilterT(f)} className="s" style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filterT===f?(TYPE_COLOR[f]||t.accent)+"88":t.border}`,background:filterT===f?`${TYPE_COLOR[f]||t.accent}18`:t.surface,color:filterT===f?TYPE_COLOR[f]||t.accent:t.sub,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
              ))}
              <div style={{width:1,background:t.border,flexShrink:0}}/>
              {["todos","pago","permuta"].map(f=>(
                <button key={f} onClick={()=>setFilterP(f)} className="s" style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filterP===f?"#34D39968":t.border}`,background:filterP===f?"#34D39914":t.surface,color:filterP===f?"#34D399":t.sub,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{f==="pago"?"💸 Pago":f==="permuta"?"🎁 Permuta":"Todos"}</button>

                  <div style={{fontSize:22,fontWeight:800,color:s.c}}>{publis.filter(p=>p.type===s.l.toLowerCase()).length}</div>

            {filtered.length===0&&<div style={{textAlign:"center",padding:32,color:t.sub,fontSize:13}}>Nenhuma publi encontrada.</div>}

                style={{background:t.card,border:`2px solid #A78BFA44`,borderRadius:16,padding:16,marginBottom:10,position:"relative"}}>
                <div style={{position:"absolute",top:-10,left:16,background:"linear-gradient(135deg,#A78BFA,#7C3AED)",color:"#FFF",fontSize:9,fontWeight:800,padding:"2px 10px",borderRadius:20,letterSpacing:1}}>📦 CAMPANHA</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,marginTop:4}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:800,color:t.text,marginBottom:2}}>{p.brand}</div>
                    <div style={{fontSize:11,color:t.sub}}>{p.inicio} → {p.delivery}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:800,color:p.payment==="pago"?"#34D399":"#FBBF24"}}>{p.payment==="pago"?`R$ ${p.value}`:"Permuta"}</div>

                    <div style={{marginBottom:10}}>

                      <span key={i} style={{background:concluido?"#34D39918":`${TYPE_COLOR[it.tipo]||"#A78BFA"}18`,border:`1px solid ${concluido?"#34D39944":TYPE_COLOR[it.tipo]||"#A78BFA"}44`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,color:concluido?"#34D399":TYPE_COLOR[it.tipo]||"#A78BFA"}}>
                        {concluido?"✓ ":""}{it.tipo==="reels"?"Reels":it.tipo==="feed"?"Feed":"Story"} {feitosDeste}/{it.qtd}
                      </span>
                    );

                </div>
                {/* Registrar por tipo */}
                {(()=>{
                  const itensRestantes = (p.campanhaItens||[]).map(it=>{

                    return {...it, feitosDeste, restam};

                  const totalFeito = (p.campanhaLog||[]).length;

                  const concluida = totalFeito >= totalGeral;

                  return (

                                {log.tipo==="reels"?"Reels":log.tipo==="feed"?"Feed":"Story"} · {log.data}

                          − Desfazer último registro
                        </button>
                      )}
                    </div>
                  );
                })()}
              </div>
              ) : (
              <div key={p.id} onClick={()=>setEditingPubli(p)} className="s" style={{background:t.card,border:`1px solid ${p.status==="atrasado"?"#F8717138":t.border}`,borderRadius:16,padding:16,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:44,height:44,borderRadius:12,background:`${TYPE_COLOR[p.type]}18`,border:`1px solid ${TYPE_COLOR[p.type]}38`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:TYPE_COLOR[p.type]}}>{p.img}</div>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:t.text}}>{p.brand}</div>

/* ─── CHECK-IN DIÁRIO ─── */
function CheckInButton({uid,goldSaldo,setGoldSaldo,lastCheckin,setLastCheckin,checkinStreak,setCheckinStreak,t,fsSet}) {
  const today  = new Date().toISOString().substr(0,10);
  const done   = lastCheckin === today;
  const [anim, setAnim] = useState(false);
  const [msg, setMsg]   = useState("");
  const SEQUENCE = [2,4,8,16,32,64,128];
  const nextIdx  = checkinStreak % SEQUENCE.length;
  const nextGold = SEQUENCE[nextIdx];
  const nextIdxAfter = (nextIdx+1) % SEQUENCE.length;

  const doCheckin = async () => {
    if (done) return;
    const newStreak = checkinStreak + 1;
    const earned    = nextGold;
    const newSaldo  = goldSaldo + earned;
    setAnim(true);
    setMsg(`+${earned} 🥇`);
    setGoldSaldo(newSaldo);
    setLastCheckin(today);
    setCheckinStreak(newStreak);
    await fsSet("goals", uid+"_gold", {
      saldo:newSaldo, lastCheckin:today, streak:newStreak, updatedAt:today
    });
    setTimeout(()=>{ setAnim(false); setMsg(""); }, 2000);
  };

  const reaisVal=(goldSaldo/100*0.10).toFixed(2);

  return (
    <div style={{background:anim?`linear-gradient(135deg,#FBBF2422,#F59E0B22)`:`${t.accent}0A`,border:`2px solid ${done?"#34D39944":"#FBBF2455"}`,borderRadius:18,padding:16,marginBottom:14,position:"relative",overflow:"hidden"}}>
      {/* Shine effect on check-in */}
      {anim&&<div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#FBBF2408,#FBBF2420)",borderRadius:18,animation:"pulse 0.5s ease"}}/>}

      {/* Header row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:done?"#34D399":"#FBBF24"}}>
            {done?"✅ Check-in feito!":"🥇 Check-in diário"}
          </div>
          <div style={{fontSize:11,color:t.sub,marginTop:2}}>
            {done?`Próximo amanhã (+${SEQUENCE[nextIdxAfter]} golds)`:`Ganhe ${nextGold} golds hoje`}
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:800,color:"#FBBF24"}}>{goldSaldo} 🥇</div>
          <div style={{fontSize:10,color:t.sub}}>= R$ {reaisVal}</div>
        </div>
      </div>

      {/* Week progress */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:12}}>
        {SEQUENCE.map((g,i)=>{
          const isPast = i < nextIdx;
          const isCurr = i === nextIdx;
          const future = i > nextIdx;
          return (
            <div key={i} style={{textAlign:"center"}}>
              <div style={{height:36,width:"100%",borderRadius:8,
                background:isPast?"#34D39930":isCurr&&done?"#34D39930":isCurr?"#FBBF2430":future?"#1A1A2E":"#1A1A2E",
                border:`1px solid ${isPast?"#34D39960":isCurr&&done?"#34D39960":isCurr?"#FBBF2460":"#1A1A2E"}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>
                {isPast?"✓":isCurr&&done?"✓":g+""}
              </div>
              <div style={{fontSize:8,color:t.sub,marginTop:3}}>🥇{g}</div>
            </div>
          );
        })}
      </div>

      {/* Action */}
      {!done?(
        <button onClick={doCheckin} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#FBBF24,#F59E0B)",color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",position:"relative"}}>
          {msg||`🥇 Fazer check-in — ganhar ${nextGold} golds`}
        </button>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"#34D39910",border:"1px solid #34D39930",borderRadius:10,padding:"9px",textAlign:"center"}}>
            <div style={{fontSize:11,color:t.sub}}>Sequência atual</div>
            <div style={{fontSize:18,fontWeight:800,color:"#34D399"}}>🔥 {checkinStreak} dias</div>
          </div>
          <div style={{background:"#FBBF2410",border:"1px solid #FBBF2430",borderRadius:10,padding:"9px",textAlign:"center"}}>
            <div style={{fontSize:11,color:t.sub}}>Saldo em reais</div>
            <div style={{fontSize:18,fontWeight:800,color:"#FBBF24"}}>R$ {reaisVal}</div>
          </div>
        </div>
      )}

      {/* Big floating message */}
      {msg&&(
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:48,fontWeight:800,color:"#FBBF24",pointerEvents:"none",animation:"fadeUp 2s ease forwards"}}>
          {msg}
        </div>
      )}
    </div>
  );
}

                      {users.map(u=>(
                        <option key={u.id||u.uid} value={u.id||u.uid}>
                          {u.name} (@{u.username}) · {u.pixKey||u.email||"sem PIX"}
                        </option>
                      ))}
                    </select>
                  </div>
                ))}
                {withdrawals.filter(w=>!users.find(u=>u.id===w.userId||u.uid===w.userId)).length===0&&(
                  <div style={{fontSize:11,color:"#34D399",textAlign:"center"}}>✓ Todos os saques estão vinculados corretamente</div>
                )}
              </div>
            </Card>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[{label:"Aguardando",val:withdrawals.filter(w=>w.status==="aguardando").length,color:"#FBBF24"},{label:"Pagos",val:withdrawals.filter(w=>w.status==="pago").length,color:"#34D399"}].map(s=>(
                <div key={s.label} style={{background:`${s.color}0C`,border:`1px solid ${s.color}28`,borderRadius:12,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:11,color:t.sub}}>{s.label}</div>
                </div>
              ))}
            </div>
            {withdrawals.length===0&&<div style={{textAlign:"center",padding:32,color:t.sub,fontSize:13}}>Nenhuma solicitação ainda.</div>}
            {withdrawals.map(w=>{
              const u=users.find(x=>x.id===w.userId||x.uid===w.userId);
              return (
                <Card key={w.id} t={t} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:t.text}}>{u?.name||"Usuário"}</div>
                      <div style={{fontSize:11,color:t.sub}}>@{u?.username} · {w.date}</div>
                      <div style={{fontSize:11,color:t.sub,marginTop:2}}>PIX: <span style={{color:t.text,fontWeight:600}}>{w.pixKey||"—"}</span></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:22,fontWeight:800,color:"#34D399"}}>R$ {w.amount?.toFixed(2)}</div>
                      <Pill label={w.status==="pago"?"✅ Pago":"⏳ Aguardando"} color={w.status==="pago"?"#34D399":"#FBBF24"}/>
                    </div>
                  </div>
                  <div style={{background:"#FBBF2410",border:"1px solid #FBBF2430",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                    <div style={{fontSize:11,color:"#FBBF24",fontWeight:600}}>⏰ Pagamentos até às 18h do dia do saque.</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={async()=>{
                        if(w.status==="aguardando"){
                          await fsUpdate("withdrawals",w.id,{status:"pago",paidAt:new Date().toISOString().substr(0,10)});
                          const userDoc = users.find(x=>x.id===w.userId||x.uid===w.userId);
                          if(userDoc){
                            const uid2 = userDoc.id||userDoc.uid;
                            await fsUpdate("users",uid2,{lastWithdrawal:new Date().toISOString().substr(0,10)});
                          }
                        }
                      }}
                      disabled={w.status==="pago"}
                      style={{gridColumn:"1/-1",padding:"10px 0",borderRadius:10,border:`2px solid ${w.status==="pago"?"#34D39944":t.border}`,background:w.status==="pago"?"#34D39914":t.accentSoft,color:w.status==="pago"?"#34D399":t.accent,fontWeight:800,fontSize:13,cursor:w.status==="pago"?"default":"pointer",opacity:w.status==="pago"?0.7:1}}>
                      {w.status==="pago"?"✅ Pago em "+w.paidAt:"💳 Confirmar Pagamento"}
                    </button>
                    {w.status==="aguardando"&&(
                      <button onClick={async()=>{
                        if(confirm("Cancelar saque?")) await fsUpdate("withdrawals",w.id,{status:"cancelado"});
                      }}
                        style={{gridColumn:"1/-1",padding:"8px 0",borderRadius:10,border:"1px solid #F8717130",background:"#F8717108",color:"#F87171",fontWeight:700,fontSize:12,cursor:"pointer",marginTop:4}}>
                        ✕ Cancelar Saque
                      </button>
                    )}
                  </div>
                </Card>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── ROOT ─── */
function InfluencePRO() {
  const [screen,setScreen] = useState("loading");
  const [user,setUser]     = useState(null);
  const [theme,setTheme]   = useState("dark");
  const t      = THEMES[theme];
  const toggle = () => setTheme(th=>{ const nv=th==="dark"?"light":th==="light"?"insta":"dark"; try{localStorage.setItem("ip_theme",nv);}catch(e){} return nv; });
  const today  = new Date().toISOString().substr(0,10);
  useEffect(()=>{
    try {
      const adminSession = localStorage.getItem("ip_admin_session");
      if(adminSession === "true"){
        setUser({isAdmin:true,name:"Administrador",avatar:"AD",uid:"admin"});
        setScreen("admin");
        return;
      }
    } catch(e){}

    const unsub = fbOnAuth(async fbUser => {
      if(fbUser){
        try {
          const profile = await fsGet("users", fbUser.uid);
          if(profile){
            setUser(profile);
            try{ const th=localStorage.getItem("ip_theme"); if(th) setTheme(th); }catch(e){}
            setScreen("app");
          } else {
            setScreen("login");
          }
        } catch(e){
          setScreen("login");
        }
      } else {
        setScreen("login");
      }
    });
    return ()=>unsub();
  },[]);

  const handleLogout = async () => {
    try{localStorage.removeItem("ip_admin_session");}catch(e){}
    await fbSignOut();
    setUser(null);
    setScreen("login");
  };

  if(screen==="loading") return <Loading t={t}/>;

  return (
    <div style={{background:t.bg,minHeight:"100vh"}}>
      {screen==="login"    && <LoginScreen    onLogin={u=>{setUser(u);setScreen(u.isAdmin?"admin":"app");}} onGoRegister={()=>setScreen("register")} t={t} themeToggle={toggle} theme={theme}/>}
      {screen==="register" && <RegisterScreen onBack={()=>setScreen("login")} onRegister={u=>{setUser(u);setScreen("app");}} t={t}/>}
      {screen==="app"      && user && <MainApp user={user} t={t} themeToggle={toggle} theme={theme} onLogout={handleLogout}/>}
      {screen==="admin"    && user && <AdminPanel t={t} themeToggle={toggle} theme={theme} onLogout={handleLogout}/>}
    </div>
  );
}

  // Mount app
  const rootEl = ReactDOM.createRoot(document.getElementById('root'));
  rootEl.render(React.createElement(InfluencePRO));
</script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js')
        .then(()=>console.log('✅ SW registrado'))
        .catch(e=>console.log('SW erro:',e));
    }
  </script>
</body>
